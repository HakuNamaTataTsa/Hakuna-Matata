<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baca Chapter - Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #07070d;
      --bg-card: rgba(255,255,255,0.04);
      --fg: #f0f0f5;
      --muted: #7a7a90;
      --accent: #FFDD57;
      --accent-dim: rgba(255,221,87,0.15);
      --border: rgba(255,255,255,0.07);
      --radius: 16px;
      --radius-sm: 10px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding-top: 80px;
    }
    a { text-decoration: none; color: inherit; }

    .navbar {
      position: fixed; top:0; left:0; right:0; z-index:100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 2rem;
      background: rgba(7,7,13,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .navbar.scrolled { background: rgba(7,7,13,0.92); box-shadow: 0 4px 30px rgba(0,0,0,0.2); }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-brand i { font-size: 1rem; opacity: 0.7; }
    .nav-links {
      list-style: none; display: flex; gap: 0.2rem; align-items: center;
    }
    .nav-links a {
      color: var(--muted); padding: 0.4rem 0.9rem; border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 500;
      transition: all 0.25s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--fg); background: var(--bg-card);
    }
    .nav-links a.active { color: var(--accent); background: var(--accent-dim); }
    .menu-toggle {
      display: none; background: none; border: 1px solid var(--border);
      color: var(--fg); font-size: 1.2rem; cursor: pointer;
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      .navbar { padding: 0.6rem 1rem; }
      .menu-toggle { display: flex; }
      .nav-links {
        display: none; position: absolute; top:100%; left:0; right:0;
        flex-direction: column; background: rgba(7,7,13,0.97);
        backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
        padding: 0.8rem; gap: 0.1rem;
      }
      .nav-links.active { display: flex; }
      .nav-links a { padding: 0.5rem 0.8rem; width: 100%; }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      transition: color 0.3s;
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-body);
    }
    .back-btn:hover { color: var(--accent); }

    .reader-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .reader-header .reader-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
    }

    .chapter-images {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .chapter-images img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: #0a0a12;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .chapter-images .image-placeholder {
      width: 100%;
      max-width: 800px;
      padding: 3rem 1rem;
      text-align: center;
      background: var(--bg-card);
      border-radius: 8px;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .chapter-images .image-placeholder i {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.5rem;
      opacity: 0.3;
    }

    .loading, .error, .info-box {
      text-align: center;
      padding: 3rem 0;
      font-size: 1.1rem;
      color: var(--muted);
    }
    .error { color: #ff6b6b; }

    .footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand"><i class="fas fa-store"></i> Akino Store</a>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="manga.html" class="active">Manga</a></li>
      <li><a href="https://wa.me/6289687163314" target="_blank">Contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <button class="back-btn" onclick="window.location.href='detail.html'"><i class="fas fa-arrow-left"></i> Kembali ke Detail</button>
    <div id="mainContent"><div class="loading">⏳ Memuat chapter...</div></div>
  </div>

  <footer class="footer">
    Data dari <a href="https://mangadex.org" target="_blank" style="color:var(--accent);">MangaDex</a> • 
    <span style="color:var(--muted);">Untuk tujuan belajar – tidak untuk komersial</span>
  </footer>

  <script>
    // ==================== KONFIGURASI ====================
    const MANGADEX_API = 'https://api.mangadex.org';
    const container = document.getElementById('mainContent');
    const urlParams = new URLSearchParams(window.location.search);
    const chapterId = urlParams.get('chapter');

    if (!chapterId) {
      container.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>Parameter chapter tidak ditemukan. Gunakan <code style="color:var(--accent);">?chapter=ID_CHAPTER</code></div>`;
      throw new Error('No chapter ID');
    }

    // ==================== FUNGSI FETCH ====================
    async function fetchAPI(url) {
      const res = await fetch(url, { signal: AbortSignal.timeout(15000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // ==================== AMBIL INFORMASI CHAPTER ====================
    async function getChapterInfo(chId) {
      try {
        const url = `${MANGADEX_API}/chapter/${chId}`;
        const data = await fetchAPI(url);
        return data.data;
      } catch (err) {
        console.warn('Gagal mengambil info chapter:', err.message);
        return null;
      }
    }

    // ==================== AMBIL GAMBAR CHAPTER ====================
    async function getChapterImages(chId) {
      try {
        const url = `${MANGADEX_API}/at-home/server/${chId}`;
        const data = await fetchAPI(url);
        return data;
      } catch (err) {
        console.warn('Gagal mengambil gambar chapter:', err.message);
        return null;
      }
    }

    // ==================== BUAT URL GAMBAR DENGAN FALLBACK ====================
    function getImageUrls(baseUrl, hash, files) {
      const urls = [];
      // Metode 1: Direct dari MangaDex
      files.forEach(file => {
        urls.push({
          src: `${baseUrl}/data/${hash}/${file}`,
          method: 'direct'
        });
      });
      // Metode 2: Via Worker (jika ada)
      const workerUrl = 'https://plain-block-86e9.akinostore.workers.dev';
      files.forEach(file => {
        const direct = `${baseUrl}/data/${hash}/${file}`;
        urls.push({
          src: `${workerUrl}/image/?url=${encodeURIComponent(direct)}`,
          method: 'worker'
        });
      });
      // Metode 3: Via corsproxy.io
      files.forEach(file => {
        const direct = `${baseUrl}/data/${hash}/${file}`;
        urls.push({
          src: `https://corsproxy.io/?${encodeURIComponent(direct)}`,
          method: 'corsproxy'
        });
      });
      // Metode 4: Via allorigins
      files.forEach(file => {
        const direct = `${baseUrl}/data/${hash}/${file}`;
        urls.push({
          src: `https://api.allorigins.win/raw?url=${encodeURIComponent(direct)}`,
          method: 'allorigins'
        });
      });
      return urls;
    }

    // ==================== LOAD CHAPTER ====================
    async function loadChapter() {
      container.innerHTML = `<div class="loading">⏳ Memuat chapter...</div>`;
      try {
        // 1. Ambil info chapter (untuk judul)
        const chapterInfo = await getChapterInfo(chapterId);
        const chNum = chapterInfo?.attributes?.chapter || '?';
        const chTitle = chapterInfo?.attributes?.title || '';

        // 2. Ambil gambar
        const imageData = await getChapterImages(chapterId);
        if (!imageData) {
          container.innerHTML = `<div class="error">❌ Gagal memuat gambar chapter. Mungkin chapter ini tidak tersedia.</div>`;
          return;
        }

        const baseUrl = imageData.baseUrl;
        const hash = imageData.chapter.hash;
        const files = imageData.chapter.data || imageData.chapter.dataSaver || [];

        if (files.length === 0) {
          container.innerHTML = `<div class="error">Tidak ada halaman untuk chapter ini.</div>`;
          return;
        }

        // Buat daftar URL dengan semua metode
        const allUrls = getImageUrls(baseUrl, hash, files);

        // Tampilkan header
        let html = `
          <div class="reader-header">
            <div class="reader-title">📖 Chapter ${chNum} ${chTitle ? '- ' + chTitle : ''}</div>
          </div>
          <div class="chapter-images" id="chapterImages">
        `;

        // Buat elemen img untuk setiap halaman dengan fallback
        for (let i = 0; i < files.length; i++) {
          const startIdx = i * 4; // 4 metode per halaman
          const urls = allUrls.slice(startIdx, startIdx + 4);

          const img = document.createElement('img');
          img.alt = `Halaman ${i+1}`;
          img.loading = 'lazy';
          img.referrerPolicy = 'no-referrer';
          img.crossOrigin = 'anonymous';
          img.style.maxWidth = '100%';
          img.style.height = 'auto';
          img.style.borderRadius = '8px';
          img.style.background = '#0a0a12';
          img.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';

          let attempt = 0;

          function tryNextUrl() {
            if (attempt < urls.length) {
              const urlObj = urls[attempt];
              console.log(`[Image ${i+1}] Mencoba ${urlObj.method}: ${urlObj.src}`);
              img.src = urlObj.src;
              attempt++;
            } else {
              // Semua metode gagal, tampilkan placeholder
              console.warn(`[Image ${i+1}] Semua metode gagal`);
              const placeholder = document.createElement('div');
              placeholder.className = 'image-placeholder';
              placeholder.innerHTML = `<i class="fas fa-image"></i><span>Gambar tidak dapat dimuat<br><small style="font-size:0.6rem;color:var(--muted);">Coba gunakan VPN atau DNS kustom</small></span>`;
              img.replaceWith(placeholder);
            }
          }

          img.onerror = function() {
            console.warn(`[Image ${i+1}] Gagal dengan ${urls[attempt-1]?.method || 'unknown'}`);
            tryNextUrl();
          };

          // Mulai dengan URL pertama
          tryNextUrl();

          // Append img ke container
          const tempDiv = document.createElement('div');
          tempDiv.appendChild(img);
          html += tempDiv.innerHTML;
        }

        html += '</div>';
        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `<div class="error">❌ Gagal memuat chapter: ${err.message}</div>`;
      }
    }

    // ==================== START ====================
    loadChapter();

    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      menuToggle.querySelector('i').className = navLinks.classList.contains('active') ? 'fas fa-xmark' : 'fas fa-bars';
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          navLinks.classList.remove('active');
          menuToggle.querySelector('i').className = 'fas fa-bars';
        }
      });
    });
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });
  </script>
</body>
</html>
