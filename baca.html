<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baca Chapter - Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #07070d;
      --bg-card: rgba(255,255,255,0.04);
      --fg: #f0f0f5;
      --muted: #7a7a90;
      --accent: #FFDD57;
      --accent-dim: rgba(255,221,87,0.15);
      --border: rgba(255,255,255,0.07);
      --radius: 16px;
      --radius-sm: 10px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding-top: 80px;
    }
    a { text-decoration: none; color: inherit; }

    .navbar {
      position: fixed; top:0; left:0; right:0; z-index:100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 2rem;
      background: rgba(7,7,13,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .navbar.scrolled { background: rgba(7,7,13,0.92); box-shadow: 0 4px 30px rgba(0,0,0,0.2); }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-brand i { font-size: 1rem; opacity: 0.7; }
    .nav-links {
      list-style: none; display: flex; gap: 0.2rem; align-items: center;
    }
    .nav-links a {
      color: var(--muted); padding: 0.4rem 0.9rem; border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 500;
      transition: all 0.25s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--fg); background: var(--bg-card);
    }
    .nav-links a.active { color: var(--accent); background: var(--accent-dim); }
    .menu-toggle {
      display: none; background: none; border: 1px solid var(--border);
      color: var(--fg); font-size: 1.2rem; cursor: pointer;
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      .navbar { padding: 0.6rem 1rem; }
      .menu-toggle { display: flex; }
      .nav-links {
        display: none; position: absolute; top:100%; left:0; right:0;
        flex-direction: column; background: rgba(7,7,13,0.97);
        backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
        padding: 0.8rem; gap: 0.1rem;
      }
      .nav-links.active { display: flex; }
      .nav-links a { padding: 0.5rem 0.8rem; width: 100%; }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      transition: color 0.3s;
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-body);
    }
    .back-btn:hover { color: var(--accent); }

    .chapter-images {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .chapter-images img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: #0a0a12;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .loading, .error, .info-box {
      text-align: center;
      padding: 3rem 0;
      font-size: 1.1rem;
      color: var(--muted);
    }
    .error { color: #ff6b6b; }

    .footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand"><i class="fas fa-store"></i> Akino Store</a>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="manga.html" class="active">Manga</a></li>
      <li><a href="https://wa.me/6289687163314" target="_blank">Contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <button class="back-btn" onclick="window.location.href='manga.html'"><i class="fas fa-arrow-left"></i> Kembali ke Daftar</button>
    <div id="mainContent"><div class="loading">⏳ Memuat chapter...</div></div>
  </div>

  <footer class="footer">
    Data dari <a href="https://komiku.id" target="_blank" style="color:var(--accent);">Komiku</a> • 
    <span style="color:var(--muted);">Untuk tujuan belajar – tidak untuk komersial</span>
  </footer>

  <script>
    const KOMIKU_API = 'https://komiku-rest-api.vercel.app';
    const container = document.getElementById('mainContent');

    const urlParams = new URLSearchParams(window.location.search);
    const chapterLink = urlParams.get('link');

    if (!chapterLink) {
      container.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>Parameter link tidak ditemukan. Gunakan <code style="color:var(--accent);">?link=URL_CHAPTER</code></div>`;
      throw new Error('No chapter link');
    }

    async function fetchChapterImages() {
      try {
        const url = `${KOMIKU_API}/baca-chapter?link=${encodeURIComponent(chapterLink)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return data;
      } catch (err) {
        throw new Error(`Gagal memuat chapter: ${err.message}`);
      }
    }

    async function loadChapter() {
      container.innerHTML = `<div class="loading">⏳ Memuat gambar...</div>`;
      try {
        const data = await fetchChapterImages();
        const images = data.images || data.data || [];

        if (images.length === 0) {
          container.innerHTML = `<div class="error">Tidak ada gambar untuk chapter ini.</div>`;
          return;
        }

        let html = '<div class="chapter-images">';
        images.forEach(img => {
          html += `<img src="${img}" alt="Halaman" loading="lazy" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.style.display='none'">`;
        });
        html += '</div>';
        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `<div class="error">❌ ${err.message}</div>`;
      }
    }

    loadChapter();

    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      menuToggle.querySelector('i').className = navLinks.classList.contains('active') ? 'fas fa-xmark' : 'fas fa-bars';
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          navLinks.classList.remove('active');
          menuToggle.querySelector('i').className = 'fas fa-bars';
        }
      });
    });
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });
  </script>
</body>
</html>
