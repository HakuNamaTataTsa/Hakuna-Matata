<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Manga - Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #07070d;
      --bg-card: rgba(255,255,255,0.04);
      --fg: #f0f0f5;
      --muted: #7a7a90;
      --accent: #FFDD57;
      --accent-dim: rgba(255,221,87,0.15);
      --border: rgba(255,255,255,0.07);
      --radius: 16px;
      --radius-sm: 10px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding-top: 80px;
    }
    a { text-decoration: none; color: inherit; }

    .navbar {
      position: fixed; top:0; left:0; right:0; z-index:100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 2rem;
      background: rgba(7,7,13,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .navbar.scrolled { background: rgba(7,7,13,0.92); box-shadow: 0 4px 30px rgba(0,0,0,0.2); }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-brand i { font-size: 1rem; opacity: 0.7; }
    .nav-links {
      list-style: none; display: flex; gap: 0.2rem; align-items: center;
    }
    .nav-links a {
      color: var(--muted); padding: 0.4rem 0.9rem; border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 500;
      transition: all 0.25s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--fg); background: var(--bg-card);
    }
    .nav-links a.active { color: var(--accent); background: var(--accent-dim); }
    .menu-toggle {
      display: none; background: none; border: 1px solid var(--border);
      color: var(--fg); font-size: 1.2rem; cursor: pointer;
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      .navbar { padding: 0.6rem 1rem; }
      .menu-toggle { display: flex; }
      .nav-links {
        display: none; position: absolute; top:100%; left:0; right:0;
        flex-direction: column; background: rgba(7,7,13,0.97);
        backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
        padding: 0.8rem; gap: 0.1rem;
      }
      .nav-links.active { display: flex; }
      .nav-links a { padding: 0.5rem 0.8rem; width: 100%; }
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      transition: color 0.3s;
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-body);
    }
    .back-btn:hover { color: var(--accent); }

    .manga-detail {
      display: flex;
      gap: 2rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }
    .manga-detail .cover {
      flex: 0 0 220px;
      max-width: 220px;
    }
    .manga-detail .cover img {
      width: 100%;
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      background: #111;
    }
    .manga-detail .cover .cover-error {
      width: 100%;
      aspect-ratio: 2/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 1rem;
    }
    .manga-detail .cover .cover-error i { font-size: 2rem; margin-bottom: 0.5rem; }
    .manga-detail .info {
      flex: 1;
      min-width: 250px;
    }
    .manga-detail .info h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .manga-detail .info .alt-title {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }
    .manga-detail .info .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
    }
    .manga-detail .info .meta span {
      padding: 0.15rem 0.7rem;
      border-radius: 20px;
      font-size: 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
    }
    .manga-detail .info .meta .status { border-color: var(--accent); color: var(--accent); }
    .manga-detail .info .description {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
      max-height: 120px;
      overflow: hidden;
      position: relative;
    }
    .manga-detail .info .description.expanded { max-height: none; }
    .manga-detail .info .description .read-more {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }

    .read-section {
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      text-align: center;
    }
    .read-section p {
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .read-section .btn-read {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 2rem;
      border: none;
      border-radius: 30px;
      background: var(--accent);
      color: #0a0a0f;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    .read-section .btn-read:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255,221,87,0.3);
    }

    .loading, .error, .info-box {
      text-align: center;
      padding: 3rem 0;
      font-size: 1.1rem;
      color: var(--muted);
    }
    .error { color: #ff6b6b; }

    .footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    @media (max-width: 768px) {
      .manga-detail .cover { flex: 0 0 160px; max-width: 160px; }
      .manga-detail .info h1 { font-size: 1.5rem; }
    }
    @media (max-width: 500px) {
      .manga-detail .cover { flex: 0 0 120px; max-width: 120px; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand"><i class="fas fa-store"></i> Akino Store</a>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="manga.html" class="active">Manga</a></li>
      <li><a href="https://wa.me/6289687163314" target="_blank">Contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <button class="back-btn" onclick="window.location.href='manga.html'"><i class="fas fa-arrow-left"></i> Kembali ke Daftar</button>
    <div id="mainContent"><div class="loading">⏳ Memuat detail...</div></div>
  </div>

  <footer class="footer">
    Data dari <a href="https://myanimelist.net" target="_blank" style="color:var(--accent);">MyAnimeList</a> • 
    <span style="color:var(--muted);">Untuk tujuan belajar – tidak untuk komersial</span>
  </footer>

  <script>
    const JIKAN_API = 'https://api.jikan.moe/v4';
    const container = document.getElementById('mainContent');
    const urlParams = new URLSearchParams(window.location.search);
    const malId = urlParams.get('mal');

    if (!malId) {
      container.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>Parameter mal tidak ditemukan. Gunakan <code style="color:var(--accent);">?mal=ID_MAL</code></div>`;
      throw new Error('No MAL ID');
    }

    async function fetchDetail() {
      try {
        const res = await fetch(`${JIKAN_API}/manga/${malId}`, { signal: AbortSignal.timeout(15000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return data.data;
      } catch (err) {
        throw new Error(`Gagal memuat detail: ${err.message}`);
      }
    }

    async function loadDetail() {
      container.innerHTML = `<div class="loading">⏳ Memuat detail...</div>`;
      try {
        const manga = await fetchDetail();
        const title = manga.title || 'Tanpa Judul';
        const altTitle = manga.title_english || manga.title_japanese || '';
        const coverUrl = manga.images?.jpg?.image_url || '';
        const synopsis = manga.synopsis || 'Tidak ada sinopsis.';
        const status = manga.status || '?';
        const type = manga.type || 'Manga';
        const score = manga.score || '?';
        const year = manga.published?.prop?.from?.year || '?';

        // Buat link baca ke Komikindo (cari judul)
        const searchTitle = encodeURIComponent(title);
        const komikindoLink = `https://komikindo.co/?s=${searchTitle}`;
        const kiryuuLink = `https://kiryuu.co/?s=${searchTitle}`;

        const html = `
          <div class="manga-detail">
            <div class="cover">
              ${coverUrl ? `<img src="${coverUrl}" alt="${title}" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.parentElement.innerHTML='<div class=\\'cover-error\\'><i class=\\'fas fa-image\\'></i>Cover tidak tersedia</div>'">` : `<div class="cover-error"><i class="fas fa-image"></i>Cover tidak tersedia</div>`}
            </div>
            <div class="info">
              <h1>${title}</h1>
              ${altTitle ? `<div class="alt-title">${altTitle}</div>` : ''}
              <div class="meta">
                <span class="status">${status}</span>
                <span>${type}</span>
                <span>${year}</span>
                <span>⭐ ${score}</span>
              </div>
              <div class="description" id="descContainer">
                ${synopsis}
                ${synopsis.length > 300 ? `<span class="read-more" onclick="toggleDesc()"> ...baca selengkapnya</span>` : ''}
              </div>
            </div>
          </div>
          <div class="read-section">
            <p><i class="fas fa-info-circle"></i> Ingin membaca manga ini? Klik tombol di bawah untuk mencari di situs baca manga.</p>
            <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
              <a href="${komikindoLink}" target="_blank" class="btn-read"><i class="fas fa-book-open"></i> Baca di Komikindo</a>
              <a href="${kiryuuLink}" target="_blank" class="btn-read" style="background:rgba(255,221,87,0.2);color:var(--accent);"><i class="fas fa-book-open"></i> Baca di Kiryuu</a>
            </div>
          </div>
        `;
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="error">❌ ${err.message}</div>`;
      }
    }

    function toggleDesc() {
      const desc = document.getElementById('descContainer');
      if (!desc) return;
      desc.classList.toggle('expanded');
      const btn = desc.querySelector('.read-more');
      if (btn) btn.textContent = desc.classList.contains('expanded') ? ' ...sembunyikan' : ' ...baca selengkapnya';
    }

    loadDetail();

    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      menuToggle.querySelector('i').className = navLinks.classList.contains('active') ? 'fas fa-xmark' : 'fas fa-bars';
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          navLinks.classList.remove('active');
          menuToggle.querySelector('i').className = 'fas fa-bars';
        }
      });
    });
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });
  </script>
</body>
</html>
