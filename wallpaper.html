<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Download Wallpaper - Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" href="https://res.cloudinary.com/d39mdjct/image/upload/v1783478697/icon_tnzy32.ico" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3B82F6" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a12;
      color: #f0f0f0;
      min-height: 100vh;
      padding-top: 20px;
      padding-bottom: 80px;
    }
    .container { max-width: 1200px; margin:0 auto; padding:0 16px; }

    /* NAVBAR SIMPLE */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .nav-bar .logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-bar .logo span { color: #3B82F6; }
    .nav-bar .logo i { color: #3B82F6; }
    .nav-bar .back-link {
      color: #8a8a9e;
      text-decoration: none;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.3s;
    }
    .nav-bar .back-link:hover { color: #fff; border-color: #3B82F6; background: rgba(59,130,246,0.1); }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .hero h1 span { color: #3B82F6; }
    .hero p { color: #8a8a9e; font-size: 0.95rem; margin-top: 0.2rem; }

    /* FILTER */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .filter-btn {
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #8a8a9e;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }
    .filter-btn:hover { color: #f0f0f0; border-color: rgba(255,255,255,0.1); }
    .filter-btn.active {
      background: #3B82F6;
      color: #fff;
      border-color: #3B82F6;
      box-shadow: 0 4px 16px rgba(59,130,246,0.2);
    }

    /* GRID ZEDGE STYLE (PORTRAIT) */
    .wallpaper-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.2rem;
    }
    .wp-card {
      background: #14141e;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
    }
    .wp-card:hover {
      transform: translateY(-4px);
      border-color: rgba(59,130,246,0.3);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .wp-card .thumb-wrap {
      width: 100%;
      aspect-ratio: 9 / 16; /* Portrait seperti Zedge */
      overflow: hidden;
      background: #0a0a12;
      position: relative;
    }
    .wp-card .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }
    .wp-card:hover .thumb-wrap img {
      transform: scale(1.04);
    }
    .wp-card .info {
      padding: 0.6rem 0.7rem 0.8rem;
    }
    .wp-card .info h4 {
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.1rem;
    }
    .wp-card .info .meta {
      font-size: 0.6rem;
      color: #6a6a7e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .wp-card .info .meta span { display: flex; align-items: center; gap: 0.2rem; }
    .wp-card .info .meta i { font-size: 0.5rem; color: #3B82F6; }

    .wp-card .download-btn-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 0.5rem 0.5rem;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .wp-card:hover .download-btn-overlay {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .wp-card .download-btn-overlay .btn-download-sm {
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      background: #3B82F6;
      border: none;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: all 0.3s;
      font-family: inherit;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }
    .wp-card .download-btn-overlay .btn-download-sm:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .loading-state { text-align:center; padding: 4rem 0; color: #6a6a7e; }
    .loading-state i { font-size: 2.5rem; display:block; margin-bottom: 0.5rem; color: #3B82F6; }

    /* MODAL / LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(20px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      flex-direction: column;
    }
    .lightbox.active { display: flex; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .lightbox .close-lb {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
      z-index: 10;
    }
    .lightbox .close-lb:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
    .lightbox .lb-content {
      max-width: 450px;
      width: 100%;
      text-align: center;
    }
    .lightbox .lb-content img {
      width: 100%;
      aspect-ratio: 9 / 16;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      background: #0a0a12;
    }
    .lightbox .lb-info {
      margin-top: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 0.2rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .lightbox .lb-info h3 { font-weight: 600; font-size: 1.1rem; }
    .lightbox .lb-info .lb-cat { font-size: 0.75rem; color: #8a8a9e; }
    .lightbox .lb-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.8rem;
      width: 100%;
    }
    .lightbox .lb-actions button {
      flex: 1;
      padding: 0.8rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .lightbox .lb-actions .btn-download-main {
      background: #3B82F6;
      color: #fff;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .lightbox .lb-actions .btn-download-main:hover { background: #2563eb; transform: translateY(-2px); }
    .lightbox .lb-actions .btn-share {
      background: rgba(255,255,255,0.05);
      color: #f0f0f0;
      border: 1px solid rgba(255,255,255,0.06);
      flex: 0.5;
    }
    .lightbox .lb-actions .btn-share:hover { background: rgba(255,255,255,0.1); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .wallpaper-grid { grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
      .wp-card .info h4 { font-size: 0.65rem; }
      .wp-card .info .meta { font-size: 0.5rem; flex-direction: column; align-items: flex-start; }
      .wp-card .download-btn-overlay { display: none; } /* hide hover overlay on mobile, use tap */
      .wp-card:active { transform: scale(0.97); }
    }
    @media (max-width: 480px) {
      .wallpaper-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
      .lightbox .lb-content { max-width: 100%; }
      .lightbox .lb-actions { flex-direction: column; }
      .lightbox .lb-actions .btn-share { flex: 1; }
    }
    @media (min-width: 1024px) {
      .wallpaper-grid { grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- NAV -->
  <nav class="nav-bar">
    <a href="index.html" class="logo"><i class="fas fa-store"></i> Akino<span>Store</span></a>
    <a href="manga.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali</a>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>Download <span>Wallpaper</span></h1>
    <p>Koleksi wallpaper HD portrait untuk layar HP kamu. Klik gambar untuk memperbesar & download.</p>
  </div>

  <!-- FILTER -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all">Semua</button>
    <button class="filter-btn" data-cat="Nature">🌿 Nature</button>
    <button class="filter-btn" data-cat="Abstract">🎨 Abstract</button>
    <button class="filter-btn" data-cat="Minimal">⬜ Minimal</button>
    <button class="filter-btn" data-cat="Dark">🌙 Dark</button>
    <button class="filter-btn" data-cat="Gradient">🌈 Gradient</button>
    <button class="filter-btn" data-cat="City">🌆 City</button>
    <button class="filter-btn" data-cat="Space">🚀 Space</button>
    <button class="filter-btn" data-cat="Anime">🎌 Anime</button>
  </div>

  <!-- GRID -->
  <div class="wallpaper-grid" id="wpGrid">
    <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Memuat wallpaper...</div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="close-lb" id="closeLb"><i class="fas fa-times"></i></button>
  <div class="lb-content">
    <img id="lbImage" src="" alt="Wallpaper Preview" />
    <div class="lb-info">
      <div>
        <h3 id="lbTitle">Title</h3>
        <span class="lb-cat" id="lbCategory">Category</span>
      </div>
      <span id="lbResolution" style="font-size:0.7rem;color:#6a6a7e;">Resolusi</span>
    </div>
    <div class="lb-actions">
      <button class="btn-download-main" id="lbDownloadBtn"><i class="fas fa-download"></i> Download</button>
      <button class="btn-share" id="lbShareBtn"><i class="fas fa-share-alt"></i></button>
    </div>
  </div>
</div>

<script>
  const grid = document.getElementById('wpGrid');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImage');
  const lbTitle = document.getElementById('lbTitle');
  const lbCategory = document.getElementById('lbCategory');
  const lbResolution = document.getElementById('lbResolution');
  const lbDownloadBtn = document.getElementById('lbDownloadBtn');
  const lbShareBtn = document.getElementById('lbShareBtn');
  const closeLb = document.getElementById('closeLb');

  let allWallpapers = [];
  let currentItem = null;

  // ===== TOAST =====
  function showToast(msg, type = 'info') {
    const container = document.getElementById('toastContainer') || (() => {
      const d = document.createElement('div');
      d.id = 'toastContainer';
      d.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:0.5rem;max-width:90%;';
      document.body.appendChild(d);
      return d;
    })();
    const toast = document.createElement('div');
    toast.style.cssText = `
      padding:0.7rem 1.4rem; background:rgba(20,20,30,0.92); backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.06); border-radius:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.4); display:flex; align-items:center; gap:0.6rem;
      animation:slideInToast 0.35s cubic-bezier(0.34,1.56,0.64,1); font-size:0.82rem;
      border-left:3px solid ${type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#3B82F6'};
      color:#f0f0f0;
    `;
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    toast.innerHTML = `<i class="fas ${icon}" style="color:${type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#3B82F6'};margin-right:0.2rem;"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(40px) scale(0.9)'; setTimeout(() => toast.remove(), 300); }, 3500);
  }

  // ===== FILTER =====
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const cat = this.dataset.cat;
      renderGrid(cat);
    });
  });

  // ===== RENDER GRID =====
  function renderGrid(category = 'all') {
    if (!allWallpapers.length) {
      grid.innerHTML = `<div class="loading-state"><i class="fas fa-image"></i> Belum ada wallpaper.</div>`;
      return;
    }
    const filtered = category === 'all' ? allWallpapers : allWallpapers.filter(w => w.category === category);
    if (!filtered.length) {
      grid.innerHTML = `<div class="loading-state"><i class="fas fa-search"></i> Tidak ada wallpaper di kategori ini.</div>`;
      return;
    }
    let html = '';
    filtered.forEach(wp => {
      html += `
        <div class="wp-card" data-id="${wp.id}">
          <div class="thumb-wrap">
            <img src="${wp.imageUrl}" alt="${wp.title}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 350%22%3E%3Crect width=%22200%22 height=%22350%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2214%22%3ENo%20Image%3C/text%3E%3C/svg%3E'" />
          </div>
          <div class="info">
            <h4>${wp.title}</h4>
            <div class="meta">
              <span><i class="fas fa-tag"></i> ${wp.category}</span>
              <span><i class="fas fa-download"></i> ${wp.downloads || 0}</span>
            </div>
          </div>
          <div class="download-btn-overlay">
            <button class="btn-download-sm" data-id="${wp.id}"><i class="fas fa-download"></i> Download</button>
          </div>
        </div>
      `;
    });
    grid.innerHTML = html;

    // Event listeners untuk card (klik buka lightbox)
    grid.querySelectorAll('.wp-card').forEach(card => {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.btn-download-sm')) return;
        const id = this.dataset.id;
        const item = allWallpapers.find(w => w.id === id);
        if (item) openLightbox(item);
      });
      // Tombol download di overlay
      card.querySelector('.btn-download-sm')?.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = this.dataset.id;
        const item = allWallpapers.find(w => w.id === id);
        if (item) triggerDownload(item);
      });
    });
  }

  // ===== LIGHTBOX =====
  function openLightbox(item) {
    currentItem = item;
    lbImg.src = item.imageUrl;
    lbTitle.textContent = item.title;
    lbCategory.textContent = item.category;
    lbResolution.textContent = item.resolution || 'HD';
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  closeLb.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ===== SHARE =====
  lbShareBtn.addEventListener('click', function() {
    if (!currentItem) return;
    if (navigator.share) {
      navigator.share({
        title: currentItem.title,
        text: `Download wallpaper ${currentItem.title} - Akino Store`,
        url: currentItem.imageUrl
      }).catch(() => {});
    } else {
      navigator.clipboard.writeText(currentItem.imageUrl).then(() => {
        showToast('Link gambar disalin!', 'success');
      }).catch(() => {
        showToast('Gagal menyalin link.', 'error');
      });
    }
  });

  // ===== TRIGGER DOWNLOAD (dengan update counter) =====
  function triggerDownload(item) {
    if (!item) return;
    const link = document.createElement('a');
    link.href = item.imageUrl;
    link.download = `${item.title.replace(/\s+/g, '_')}.jpg`;
    link.target = '_blank';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // Update download counter di Firestore
    const docRef = db.collection('wallpapers').doc(item.id);
    docRef.update({
      downloads: firebase.firestore.FieldValue.increment(1)
    }).catch(() => {});
    showToast('Download dimulai!', 'success');
    closeLightbox();
  }

  // Tombol download di lightbox
  lbDownloadBtn.addEventListener('click', function() {
    if (currentItem) triggerDownload(currentItem);
  });

  // ===== LOAD FROM FIRESTORE =====
  firebase.auth().onAuthStateChanged(() => {
    // Biarkan semua orang bisa lihat wallpaper
    loadWallpapers();
  });

  function loadWallpapers() {
    grid.innerHTML = `<div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Memuat wallpaper...</div>`;
    db.collection('wallpapers')
      .orderBy('createdAt', 'desc')
      .get()
      .then(snap => {
        if (snap.empty) {
          grid.innerHTML = `<div class="loading-state"><i class="fas fa-image"></i> Belum ada wallpaper.</div>`;
          return;
        }
        allWallpapers = [];
        snap.forEach(doc => {
          allWallpapers.push({ id: doc.id, ...doc.data() });
        });
        renderGrid('all');
      })
      .catch(err => {
        console.error(err);
        grid.innerHTML = `<div class="loading-state"><i class="fas fa-exclamation-triangle"></i> Gagal memuat data.</div>`;
      });
  }
</script>

</body>
</html>
