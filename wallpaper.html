      <i class="fas fa-download"></i> Download Wallpaper
    </button>

  <!-- ===== OVERLAY ===== -->
  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <button class="close-overlay" onclick="closeOverlay()" aria-label="Tutup">
        <i class="fas fa-times"></i>
      </button>

      <div class="icon-top"><i class="fas fa-clock"></i></div>

      <!-- TOMBOL DOWNLOAD -->

  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ============================================================
  SCRIPTS
  ============================================================ -->
  <script>
    // ============================================================
    // KONFIGURASI
    // ============================================================
    const COUNTDOWN_DURATION = 10;
    const DOWNLOAD_URL = 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=800&q=80&download=1';
    const WALLPAPER_NAME = 'wallpaper-akino.jpg';

    // ============================================================
    // ELEMEN
    // ============================================================
    const overlay = document.getElementById('overlay');
    const countdownCircle = document.getElementById('countdownCircle');
    const downloadOverlayBtn = document.getElementById('downloadOverlayBtn');
    const mainBtn = document.getElementById('mainDownloadBtn');
    const adContainer = document.getElementById('adContainer');
    const adLoading = document.getElementById('adLoading');
    const toastContainer = document.getElementById('toastContainer');

    let countdownInterval = null;
    let timeLeft = COUNTDOWN_DURATION;
    let isDownloading = false;

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { info: 'fa-info-circle', success: 'fa-check-circle', error: 'fa-exclamation-circle' };
      toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(40px) scale(0.9)';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // ============================================================
    // 🔥 CEK SCRIPT ADSTERRA & TRIGGER
    // ============================================================
    function triggerAdsterra() {
      console.log('🔄 Mencoba trigger Adsterra...');
      
      // Coba beberapa kemungkinan trigger
      try {
        // 1. Coba langsung dari script yang di-load (biasanya otomatis)
        if (typeof window.Adsterra !== 'undefined') {
          console.log('✅ Adsterra found, triggering...');
          if (window.Adsterra.show) {
            window.Adsterra.show();
          }
          if (window.Adsterra.showPopunder) {
            window.Adsterra.showPopunder();
          }
          if (window.Adsterra.showInterstitial) {
            window.Adsterra.showInterstitial();
          }
        }
        
        // 2. Coba trigger melalui event click (simulasi)
        // Beberapa script Adsterra membutuhkan interaksi user untuk popunder
        // Kita sudah punya interaksi user (klik tombol download), jadi seharusnya sudah cukup
        
        // 3. Coba trigger dengan custom event
        const event = new CustomEvent('adsterra_trigger');
        document.dispatchEvent(event);
        
        console.log('✅ Adsterra trigger selesai');
      } catch (e) {
        console.log('⚠️ Trigger Adsterra error:', e);
      }
    }

    // ============================================================
    // OPEN OVERLAY
    // ============================================================
    function openOverlay() {
      if (isDownloading) return;

      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      // Reset
      timeLeft = COUNTDOWN_DURATION;
      countdownCircle.textContent = timeLeft;
      countdownCircle.className = 'countdown-circle';
      downloadOverlayBtn.disabled = true;
      downloadOverlayBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menunggu...';

      // Sembunyikan loading iklan setelah 2 detik
      setTimeout(() => {
        if (adLoading) {
          adLoading.style.display = 'none';
        }
      }, 2000);

      // 🔥 TRIGGER IKLAN ADSTERRA
      triggerAdsterra();

      // 🔥 ALTERNATIF: Buka popunder manual (biasanya script Adsterra popunder bisa di-trigger dengan ini)
      // Coba buka popunder dengan cara ini (jika script mendukung)
      setTimeout(() => {
        try {
          // Beberapa script popunder perlu di-trigger dengan event click
          // Karena user sudah klik, kita coba panggil fungsi global
          if (typeof window.openPopunder === 'function') {
            window.openPopunder();
          }
          if (typeof window.showPopunder === 'function') {
            window.showPopunder();
          }
        } catch (e) {}
      }, 100);

      // Mulai countdown
      if (countdownInterval) clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        timeLeft--;
        countdownCircle.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(countdownInterval);
          countdownInterval = null;
          countdownCircle.textContent = '✓';
          countdownCircle.className = 'countdown-circle done';
          downloadOverlayBtn.disabled = false;
          downloadOverlayBtn.innerHTML = '<i class="fas fa-download"></i> Download Sekarang';

          downloadOverlayBtn.onclick = function() {
            startDownload();
          };
        }
      }, 1000);
    }

    // ============================================================
    // CLOSE OVERLAY
    // ============================================================
    function closeOverlay() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      downloadOverlayBtn.disabled = true;
      downloadOverlayBtn.innerHTML = '<i class="fas fa-download"></i> Download Sekarang';
      downloadOverlayBtn.onclick = null;
      timeLeft = COUNTDOWN_DURATION;
      countdownCircle.textContent = timeLeft;
      countdownCircle.className = 'countdown-circle';
      if (adLoading) {
        adLoading.style.display = 'flex';
      }
    }

    // ============================================================
    // START DOWNLOAD
    // ============================================================
    function startDownload() {
      if (isDownloading) return;
      isDownloading = true;

      downloadOverlayBtn.disabled = true;
      downloadOverlayBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

      setTimeout(() => {
        try {
          const link = document.createElement('a');
          link.href = DOWNLOAD_URL;
          link.download = WALLPAPER_NAME;
          link.target = '_blank';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);

          showToast('✅ Wallpaper berhasil diunduh!', 'success');

          setTimeout(() => {
            closeOverlay();
            mainBtn.innerHTML = '<i class="fas fa-check-circle"></i> Download Berhasil!';
            setTimeout(() => {
              mainBtn.innerHTML = '<i class="fas fa-download"></i> Download Wallpaper';
              isDownloading = false;
            }, 2500);
          }, 500);
        } catch (err) {
          showToast('❌ Gagal mendownload. Coba lagi.', 'error');
          downloadOverlayBtn.disabled = false;
          downloadOverlayBtn.innerHTML = '<i class="fas fa-download"></i> Download Sekarang';
          isDownloading = false;
        }
      }, 500);
    }

    // ============================================================
    // ESCAPE KEY
    // ============================================================
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        closeOverlay();
      }
    });

    // ============================================================
    // CLICK OUTSIDE OVERLAY
    // ============================================================
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        closeOverlay();
      }
    });

    // ============================================================
    // SERVICE WORKER
    // ============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js?v=4.1')
          .then(() => console.log('✅ SW registered'))
          .catch(err => console.log('❌ SW failed:', err));
      });

  <!-- ===== FORCE UPDATE SERVICE WORKER ===== -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(reg => {
        if (reg) {
          reg.update();
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed') {
                newSW.postMessage('skipWaiting');
                setTimeout(() => {
                  window.location.reload();
                }, 800);
              }
            });
          });
        }
      });
    }
  </script>
