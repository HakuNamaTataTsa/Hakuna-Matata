      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      width: 100%;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 20px rgba(34,197,94,0.15);
    }
    .btn-download-overlay:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    .btn-download-overlay:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(34,197,94,0.3);
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 99999;

      flex-direction: column;

    .toast {
      padding: 0.7rem 1.4rem;
      background: rgba(20,20,30,0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);

    .toast i { color: #3B82F6; }
    .toast.success { border-left-color: #22c55e; }

    .toast.error { border-left-color: #ef4444; }
    .toast.error i { color: #ef4444; }
    @keyframes slideInToast {

    @media (max-width: 480px) {

<body>

  <div class="ambient" aria-hidden="true">

    <!-- ===== NATIVE BANNER (Social Bar / In-Page Push) ===== -->

  <!-- ===== OVERLAY COUNTDOWN ===== -->
  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <button class="close-overlay" onclick="closeOverlay()" aria-label="Tutup">
        <i class="fas fa-times"></i>
      </button>

      <div class="icon-top"><i class="fas fa-clock"></i></div>
      <h3>Tunggu Sebentar</h3>
      <p class="sub">Tunggu 10 detik sambil melihat iklan di bawah.</p>

      <!-- Banner di dalam overlay (biar user melihat iklan) -->
      <div class="ad-banner-wrapper" style="margin-bottom:1rem;min-height:60px;">
        <div class="ad-container" id="adContainerOverlay">
          <div class="ad-placeholder">
            <i class="fas fa-ad"></i>

          </div>

        <div>
          <div class="countdown-label">detik tersisa</div>
          <div style="font-size:0.6rem;color:#4a4a5e;margin-top:0.1rem;">Tunggu hingga selesai</div>
        </div>
      </div>

      <button class="btn-download-overlay" id="downloadOverlayBtn" disabled>
        <i class="fas fa-download"></i> Download Sekarang
      </button>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ============================================================
  SCRIPTS
  ============================================================ -->
  <script>
    const COUNTDOWN_DURATION = 10;
    const DOWNLOAD_URL = 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=800&q=80&download=1';
    const WALLPAPER_NAME = 'wallpaper-akino.jpg';

    const overlay = document.getElementById('overlay');
    const countdownCircle = document.getElementById('countdownCircle');
    const downloadOverlayBtn = document.getElementById('downloadOverlayBtn');
    const mainBtn = document.getElementById('mainDownloadBtn');
    const toastContainer = document.getElementById('toastContainer');

    let countdownInterval = null;
    let timeLeft = COUNTDOWN_DURATION;
    let isDownloading = false;

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { info: 'fa-info-circle', success: 'fa-check-circle', error: 'fa-exclamation-circle' };
      toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(40px) scale(0.9)';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function openOverlay() {
      if (isDownloading) return;

      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      timeLeft = COUNTDOWN_DURATION;
      countdownCircle.textContent = timeLeft;
      countdownCircle.className = 'countdown-circle';
      downloadOverlayBtn.disabled = true;
      downloadOverlayBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menunggu...';

      if (countdownInterval) clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        timeLeft--;
        countdownCircle.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(countdownInterval);
          countdownInterval = null;
          countdownCircle.textContent = '✓';
          countdownCircle.className = 'countdown-circle done';
          downloadOverlayBtn.disabled = false;
          downloadOverlayBtn.innerHTML = '<i class="fas fa-download"></i> Download Sekarang';
          downloadOverlayBtn.onclick = function() { startDownload(); };
        }
      }, 1000);
    }

    function closeOverlay() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      downloadOverlayBtn.disabled = true;
      downloadOverlayBtn.innerHTML = '<i class="fas fa-download"></i> Download Sekarang';
      downloadOverlayBtn.onclick = null;
      timeLeft = COUNTDOWN_DURATION;
      countdownCircle.textContent = timeLeft;
      countdownCircle.className = 'countdown-circle';
    }

    function startDownload() {
      if (isDownloading) return;
      isDownloading = true;

      downloadOverlayBtn.disabled = true;
      downloadOverlayBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

      setTimeout(() => {
        try {
          const link = document.createElement('a');
          link.href = DOWNLOAD_URL;
          link.download = WALLPAPER_NAME;
          link.target = '_blank';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);

          showToast('✅ Wallpaper berhasil diunduh!', 'success');

          setTimeout(() => {
            closeOverlay();
            mainBtn.innerHTML = '<i class="fas fa-check-circle"></i> Download Berhasil!';
            setTimeout(() => {
              mainBtn.innerHTML = '<i class="fas fa-download"></i> Download Wallpaper';
              isDownloading = false;
            }, 2500);
          }, 500);
        } catch (err) {
          showToast('❌ Gagal mendownload. Coba lagi.', 'error');
          downloadOverlayBtn.disabled = false;
          downloadOverlayBtn.innerHTML = '<i class="fas fa-download"></i> Download Sekarang';
          isDownloading = false;
        }
      }, 500);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        closeOverlay();
      }
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        closeOverlay();
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js?v=4.1')
          .then(() => console.log('✅ SW registered'))
          .catch(err => console.log('❌ SW failed:', err));
      });
    }

    console.log('📱 Download Wallpaper - Akino Store');
    console.log('🔗 Script Native Banner aktif!');
  </script>
</body>
