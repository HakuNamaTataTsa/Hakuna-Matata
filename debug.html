<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug API</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:2rem">
<h2>Debug API Proxy</h2>
<pre id="result">Loading...</pre>
<script>
(async function(){
  try{
    var r = await fetch('/api/?key=e83ae8a3db85e67a25a91887c05991b62594e6257608ec7210d4dc8d598f65c0');
    var t = await r.text();
    document.getElementById('result').textContent = 'Status: ' + r.status + '\n\nResponse:\n' + t;
  }catch(e){
    document.getElementById('result').textContent = 'Error: ' + e.message;
  }
})();
</script>
</body>
</html>
