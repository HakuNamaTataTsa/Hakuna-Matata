<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Admin Wallpaper - Akino Store</title>
  <link rel="icon" href="https://res.cloudinary.com/d39mdjct/image/upload/v1783478697/icon_tnzy32.ico" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3B82F6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js?v=4.1"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a12;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width:800px; margin:0 auto; }
    .back-link {
      display:inline-flex; align-items:center; gap:0.4rem;
      color:#8a8a9e; text-decoration:none; font-size:0.78rem;
      margin-bottom:1rem; transition:color 0.3s;
    }
    .back-link:hover { color:#3B82F6; }

    h1 { font-size:1.8rem; font-weight:800; margin-bottom:0.3rem; }
    h1 span { color:#3B82F6; }
    .sub { color:#8a8a9e; font-size:0.9rem; margin-bottom:1.5rem; }

    .form-card {
      background:#1a1a2e; border-radius:16px; padding:1.5rem;
      border:1px solid rgba(255,255,255,0.06); margin-bottom:1.5rem;
    }
    .form-group { margin-bottom:1rem; }
    .form-group label {
      display:block; font-size:0.78rem; font-weight:500; color:#8a8a9e;
      margin-bottom:0.3rem;
    }
    .form-group input, .form-group textarea, .form-group select {
      width:100%; padding:0.7rem 1rem;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06);
      border-radius:10px; color:#f0f0f0; font-size:0.9rem;
      outline:none; transition:border 0.3s; font-family:inherit;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color:#3B82F6;
    }
    .form-group textarea { resize:vertical; min-height:80px; }
    .form-group select option { background:#1a1a2e; }

    .btn-submit {
      padding:0.8rem 2rem; border-radius:12px;
      background:linear-gradient(145deg, #3B82F6, #2563eb);
      color:#fff; font-weight:700; font-size:0.95rem;
      border:none; cursor:pointer; transition:all 0.3s;
      font-family:inherit; width:100%;
    }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(59,130,246,0.3); }
    .btn-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

    .list-card {
      background:#1a1a2e; border-radius:16px; padding:1rem;
      border:1px solid rgba(255,255,255,0.06);
    }
    .list-item {
      display:flex; align-items:center; gap:0.8rem;
      padding:0.5rem 0; border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .list-item:last-child { border-bottom:none; }
    .list-item img {
      width:60px; height:40px; object-fit:cover; border-radius:6px;
      background:#0a0a12;
    }
    .list-item .info { flex:1; }
    .list-item .info h4 { font-size:0.85rem; font-weight:600; }
    .list-item .info span { font-size:0.7rem; color:#8a8a9e; }
    .list-item .btn-del {
      color:#ef4444; background:none; border:none; cursor:pointer;
      font-size:0.8rem; padding:0.3rem 0.5rem; border-radius:6px;
      transition:background 0.3s;
    }
    .list-item .btn-del:hover { background:rgba(239,68,68,0.1); }

    .toast-container {
      position:fixed; bottom:24px; right:24px; z-index:9999;
      display:flex; flex-direction:column; gap:0.5rem; max-width:90%;
    }
    .toast {
      padding:0.7rem 1.4rem; background:rgba(20,20,30,0.92);
      backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.06);
      border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.4);
      display:flex; align-items:center; gap:0.6rem;
      animation:slideInToast 0.35s cubic-bezier(0.34,1.56,0.64,1);
      font-size:0.82rem; border-left:3px solid #3B82F6;
    }
    .toast i { color:#3B82F6; font-size:0.9rem; }
    .toast.success { border-left-color:#22c55e; }
    .toast.success i { color:#22c55e; }
    .toast.error { border-left-color:#ef4444; }
    .toast.error i { color:#ef4444; }
    @keyframes slideInToast {
      from { opacity:0; transform:translateX(50px) scale(0.9); }
      to { opacity:1; transform:translateX(0) scale(1); }
    }

    .empty { text-align:center; padding:2rem 0; color:#6a6a7e; }
    .empty i { font-size:2rem; display:block; margin-bottom:0.3rem; opacity:0.3; }
  </style>
</head>
<body>
  <div class="container">
    <a href="admin.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Admin</a>

    <h1>Kelola <span>Wallpaper</span></h1>
    <p class="sub">Upload wallpaper baru atau hapus wallpaper yang sudah ada.</p>

    <div class="form-card" id="uploadForm">
      <div class="form-group">
        <label>Judul Wallpaper</label>
        <input type="text" id="wpTitle" placeholder="Contoh: Sunset Beach" />
      </div>
      <div class="form-group">
        <label>Kategori</label>
        <select id="wpCategory">
          <option value="Nature">🌿 Nature</option>
          <option value="Abstract">🎨 Abstract</option>
          <option value="Minimal">⬜ Minimal</option>
          <option value="Dark">🌙 Dark</option>
          <option value="Gradient">🌈 Gradient</option>
          <option value="City">🌆 City</option>
          <option value="Space">🚀 Space</option>
          <option value="Anime">🎌 Anime</option>
        </select>
      </div>
      <div class="form-group">
        <label>Deskripsi (opsional)</label>
        <textarea id="wpDesc" placeholder="Deskripsi singkat tentang wallpaper ini..."></textarea>
      </div>
      <div class="form-group">
        <label>URL Gambar (Cloudinary)</label>
        <input type="text" id="wpImage" placeholder="https://res.cloudinary.com/..." />
        <div style="font-size:0.7rem;color:#6a6a7e;margin-top:0.2rem;">
          <i class="fas fa-info-circle"></i> Upload ke Cloudinary dulu, lalu copy URL-nya
        </div>
      </div>
      <div class="form-group">
        <label>Resolusi (opsional)</label>
        <input type="text" id="wpResolution" placeholder="1920x1080" value="1920x1080" />
      </div>
      <button class="btn-submit" id="uploadBtn"><i class="fas fa-upload"></i> Upload Wallpaper</button>
    </div>

    <div class="list-card" id="wallpaperList">
      <h3 style="margin-bottom:0.8rem;font-size:1rem;">Daftar Wallpaper</h3>
      <div id="listContainer">
        <div class="empty"><i class="fas fa-spinner fa-spin"></i> Memuat...</div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const toastContainer = document.getElementById('toastContainer');
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { info: 'fa-info-circle', success: 'fa-check-circle', error: 'fa-exclamation-circle' };
      toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(40px) scale(0.9)';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // ===== CHECK LOGIN =====
    firebase.auth().onAuthStateChanged(function(user) {
      if (!user) {
        showToast('Silakan login sebagai admin terlebih dahulu.', 'error');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }
      // Cek apakah user adalah admin (opsional: cek email tertentu)
      loadWallpapers();
    });

    // ===== UPLOAD =====
    document.getElementById('uploadBtn').addEventListener('click', function() {
      const title = document.getElementById('wpTitle').value.trim();
      const category = document.getElementById('wpCategory').value;
      const desc = document.getElementById('wpDesc').value.trim();
      const imageUrl = document.getElementById('wpImage').value.trim();
      const resolution = document.getElementById('wpResolution').value.trim() || '1920x1080';

      if (!title || !imageUrl) {
        showToast('Judul dan URL gambar wajib diisi!', 'error');
        return;
      }

      if (!imageUrl.includes('cloudinary.com')) {
        showToast('Gunakan URL dari Cloudinary!', 'error');
        return;
      }

      this.disabled = true;
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

      db.collection('wallpapers').add({
        title: title,
        category: category,
        description: desc || '',
        imageUrl: imageUrl,
        resolution: resolution,
        downloads: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(function() {
        showToast('✅ Wallpaper berhasil diupload!', 'success');
        document.getElementById('wpTitle').value = '';
        document.getElementById('wpDesc').value = '';
        document.getElementById('wpImage').value = '';
        loadWallpapers();
      })
      .catch(function(err) {
        showToast('❌ Gagal upload: ' + err.message, 'error');
      })
      .finally(function() {
        document.getElementById('uploadBtn').disabled = false;
        document.getElementById('uploadBtn').innerHTML = '<i class="fas fa-upload"></i> Upload Wallpaper';
      });
    });

    // ===== LOAD WALLPAPERS =====
    function loadWallpapers() {
      const container = document.getElementById('listContainer');

      db.collection('wallpapers')
        .orderBy('createdAt', 'desc')
        .get()
        .then(function(snapshot) {
          if (snapshot.empty) {
            container.innerHTML = `<div class="empty"><i class="fas fa-image"></i> Belum ada wallpaper.</div>`;
            return;
          }
          let html = '';
          snapshot.forEach(function(doc) {
            const data = doc.data();
            html += `
              <div class="list-item">
                <img src="${data.imageUrl}" alt="${data.title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 60%22%3E%3Crect width=%22100%22 height=%2260%22 fill=%22%23222%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2212%22%3ENo%20Image%3C/text%3E%3C/svg%3E'" />
                <div class="info">
                  <h4>${data.title}</h4>
                  <span>${data.category} • ${data.resolution || '1920x1080'} • ${data.downloads || 0} downloads</span>
                </div>
                <button class="btn-del" data-id="${doc.id}"><i class="fas fa-trash-alt"></i></button>
              </div>
            `;
          });
          container.innerHTML = html;

          // ===== DELETE =====
          container.querySelectorAll('.btn-del').forEach(function(btn) {
            btn.addEventListener('click', function() {
              const id = this.dataset.id;
              if (confirm('Hapus wallpaper ini?')) {
                db.collection('wallpapers').doc(id).delete()
                  .then(function() {
                    showToast('✅ Wallpaper dihapus.', 'success');
                    loadWallpapers();
                  })
                  .catch(function(err) {
                    showToast('❌ Gagal hapus: ' + err.message, 'error');
                  });
              }
            });
          });
        })
        .catch(function(err) {
          console.error('Error loading wallpapers:', err);
          container.innerHTML = `<div class="empty"><i class="fas fa-exclamation-triangle"></i> Gagal memuat.</div>`;
        });
    }
  </script>
</body>
</html>
