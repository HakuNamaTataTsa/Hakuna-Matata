<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baca Manga - Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #07070d;
      --bg-card: rgba(255,255,255,0.04);
      --fg: #f0f0f5;
      --muted: #7a7a90;
      --accent: #FFDD57;
      --accent-dim: rgba(255,221,87,0.15);
      --border: rgba(255,255,255,0.07);
      --radius: 16px;
      --radius-sm: 10px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding-top: 80px;
    }
    a { text-decoration: none; color: inherit; }

    .navbar {
      position: fixed; top:0; left:0; right:0; z-index:100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 2rem;
      background: rgba(7,7,13,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .navbar.scrolled { background: rgba(7,7,13,0.92); box-shadow: 0 4px 30px rgba(0,0,0,0.2); }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-brand i { font-size: 1rem; opacity: 0.7; }
    .nav-links {
      list-style: none; display: flex; gap: 0.2rem; align-items: center;
    }
    .nav-links a {
      color: var(--muted); padding: 0.4rem 0.9rem; border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 500;
      transition: all 0.25s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--fg); background: var(--bg-card);
    }
    .nav-links a.active { color: var(--accent); background: var(--accent-dim); }
    .menu-toggle {
      display: none; background: none; border: 1px solid var(--border);
      color: var(--fg); font-size: 1.2rem; cursor: pointer;
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      .navbar { padding: 0.6rem 1rem; }
      .menu-toggle { display: flex; }
      .nav-links {
        display: none; position: absolute; top:100%; left:0; right:0;
        flex-direction: column; background: rgba(7,7,13,0.97);
        backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
        padding: 0.8rem; gap: 0.1rem;
      }
      .nav-links.active { display: flex; }
      .nav-links a { padding: 0.5rem 0.8rem; width: 100%; }
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
    }
    .page-header h1 span { color: var(--accent); }
    .search-box {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .search-box input {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: 30px;
      background: var(--bg-card);
      color: var(--fg);
      font-size: 0.9rem;
      width: 220px;
      transition: border-color 0.3s;
    }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-box button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 30px;
      background: var(--accent);
      color: #0a0a0f;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .search-box button:hover { background: #e6c64a; }

    .section { margin-bottom: 2.5rem; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    .section-header h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-header h2 i { font-size: 1rem; opacity: 0.7; }
    .section-header .badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.6rem;
      border-radius: 50px;
      background: var(--accent-dim);
      color: var(--accent);
    }
    .section-header .view-all {
      font-size: 0.8rem;
      color: var(--muted);
      transition: color 0.2s;
    }
    .section-header .view-all:hover { color: var(--accent); }

    .carousel-wrapper { position: relative; overflow: hidden; }
    .carousel-track {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 0.5rem 0.2rem 1rem;
      scroll-behavior: smooth;
    }
    .carousel-track::-webkit-scrollbar { height: 4px; }
    .carousel-track::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    .carousel-track::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    .carousel-track { scrollbar-color: var(--accent) rgba(255,255,255,0.05); scrollbar-width: thin; }

    .manga-card {
      flex: 0 0 160px;
      width: 160px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
      scroll-snap-align: start;
    }
    .manga-card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(255,221,87,0.08);
    }
    .manga-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: #111;
    }
    .manga-card .info {
      padding: 0.6rem 0.6rem 0.8rem;
    }
    .manga-card .title {
      font-weight: 600;
      font-size: 0.8rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
      margin-bottom: 0.1rem;
    }
    .manga-card .meta {
      font-size: 0.6rem;
      color: var(--muted);
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .manga-card .meta span {
      background: rgba(255,255,255,0.05);
      padding: 0.05rem 0.4rem;
      border-radius: 20px;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(7,7,13,0.7);
      backdrop-filter: blur(8px);
      color: var(--fg);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .carousel-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .carousel-btn.prev { left: 0; }
    .carousel-btn.next { right: 0; }
    .carousel-btn.hidden { opacity: 0; pointer-events: none; }

    .loading, .error, .info-box {
      text-align: center;
      padding: 3rem 0;
      font-size: 1.1rem;
      color: var(--muted);
    }
    .error { color: #ff6b6b; }

    .footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    @media (max-width: 600px) {
      .manga-card { flex: 0 0 130px; width: 130px; }
      .page-header h1 { font-size: 1.5rem; }
      .search-box input { width: 100%; }
      .carousel-btn { width: 28px; height: 28px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand"><i class="fas fa-store"></i> Akino Store</a>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="manga.html" class="active">Manga</a></li>
      <li><a href="https://wa.me/6289687163314" target="_blank">Contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>📚 Baca <span>Manga</span></h1>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari judul...">
        <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
      </div>
    </div>
    <div id="sectionsContainer"><div class="loading">⏳ Memuat manga...</div></div>
  </div>

  <footer class="footer">
    Data dari <a href="https://myanimelist.net" target="_blank" style="color:var(--accent);">MyAnimeList</a> &amp; <a href="https://mangadex.org" target="_blank" style="color:var(--accent);">MangaDex</a> • 
    <span style="color:var(--muted);">Untuk tujuan belajar – tidak untuk komersial</span>
  </footer>

  <script>
    // ==================== KONFIGURASI ====================
    const JIKAN_API = 'https://api.jikan.moe/v4';
    const LIMIT = 12;
    const container = document.getElementById('sectionsContainer');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    // ==================== FUNGSI FETCH ====================
    async function fetchJikan(endpoint, params = {}) {
      const urlParams = new URLSearchParams(params);
      const url = `${JIKAN_API}${endpoint}?${urlParams.toString()}`;
      const res = await fetch(url, { signal: AbortSignal.timeout(15000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // ==================== RENDER CAROUSEL ====================
    function renderCarousel(sectionId, title, icon, data, badge = '') {
      const mangaList = data.data || [];
      if (mangaList.length === 0) {
        return `<div class="section" id="section-${sectionId}">
          <div class="section-header"><h2><i class="${icon}"></i> ${title}</h2></div>
          <p style="color:var(--muted);">Tidak ada data.</p>
        </div>`;
      }

      let cards = '';
      mangaList.forEach(item => {
        const titleText = item.title || 'Tanpa Judul';
        const coverUrl = item.images?.jpg?.image_url || '';
        const year = item.published?.prop?.from?.year || '?';
        const type = item.type || 'Manga';

        cards += `
          <div class="manga-card" data-mal-id="${item.mal_id}" data-title="${encodeURIComponent(titleText)}">
            <img src="${coverUrl}" alt="${titleText}" loading="lazy" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 280%22%3E%3Crect fill=%22%23111%22 width=%22200%22 height=%22280%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-family=%22sans-serif%22 font-size=%2214%22 fill=%22%23666%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Cover%3C/text%3E%3C/svg%3E'">
            <div class="info">
              <div class="title">${titleText}</div>
              <div class="meta"><span>${type}</span><span>${year}</span></div>
            </div>
          </div>
        `;
      });

      return `<div class="section" id="section-${sectionId}">
        <div class="section-header">
          <h2><i class="${icon}"></i> ${title} ${badge ? `<span class="badge">${badge}</span>` : ''}</h2>
          <a href="#" class="view-all" onclick="event.preventDefault(); alert('Fitur lihat semua akan segera hadir!');">Lihat semua <i class="fas fa-arrow-right"></i></a>
        </div>
        <div class="carousel-wrapper">
          <button class="carousel-btn prev hidden" onclick="scrollCarousel('section-${sectionId}', -1)"><i class="fas fa-chevron-left"></i></button>
          <div class="carousel-track" id="track-${sectionId}">${cards}</div>
          <button class="carousel-btn next hidden" onclick="scrollCarousel('section-${sectionId}', 1)"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>`;
    }

    function scrollCarousel(sectionId, direction) {
      const track = document.getElementById(`track-${sectionId}`);
      if (!track) return;
      const cardWidth = track.querySelector('.manga-card')?.offsetWidth || 160;
      const gap = 16;
      track.scrollBy({ left: direction * (cardWidth + gap) * 3, behavior: 'smooth' });
    }

    function updateCarouselButtons(sectionId) {
      const track = document.getElementById(`track-${sectionId}`);
      if (!track) return;
      const wrapper = track.closest('.carousel-wrapper');
      const prevBtn = wrapper.querySelector('.prev');
      const nextBtn = wrapper.querySelector('.next');
      const canScrollLeft = track.scrollLeft > 10;
      const canScrollRight = track.scrollLeft + track.clientWidth < track.scrollWidth - 10;
      prevBtn.classList.toggle('hidden', !canScrollLeft);
      nextBtn.classList.toggle('hidden', !canScrollRight);
    }

    // ==================== LOAD SEMUA ====================
    async function loadAllSections() {
      container.innerHTML = `<div class="loading">⏳ Memuat manga...</div>`;
      try {
        const [latest, topManga] = await Promise.all([
          fetchJikan('/seasons/now', { limit: LIMIT }),
          fetchJikan('/top/manga', { limit: LIMIT })
        ]);

        let html = '';
        html += renderCarousel('latest', 'Manga Terbaru', 'fas fa-clock', latest, '🔥');
        html += renderCarousel('top', 'Manga Populer', 'fas fa-fire', topManga, '⭐');
        container.innerHTML = html;

        document.querySelectorAll('.manga-card').forEach(card => {
          card.addEventListener('click', () => {
            const malId = card.dataset.malId;
            const title = decodeURIComponent(card.dataset.title);
            if (malId) {
              window.location.href = `detail.html?mal=${malId}&title=${encodeURIComponent(title)}`;
            }
          });
        });

        ['latest', 'top'].forEach(id => {
          const track = document.getElementById(`track-${id}`);
          if (track) {
            track.addEventListener('scroll', () => updateCarouselButtons(id));
            setTimeout(() => updateCarouselButtons(id), 100);
          }
        });
      } catch (err) {
        container.innerHTML = `<div class="error">❌ Gagal memuat: ${err.message}</div>`;
      }
    }

    // ==================== SEARCH ====================
    async function handleSearch() {
      const query = searchInput.value.trim();
      if (!query) { loadAllSections(); return; }
      container.innerHTML = `<div class="loading">⏳ Mencari "${query}"...</div>`;
      try {
        const data = await fetchJikan('/manga', { q: query, limit: 24 });
        if (!data.data || data.data.length === 0) {
          container.innerHTML = `<div class="error">😕 Tidak ada manga ditemukan untuk "${query}".</div>`;
          return;
        }
        let html = `<div class="section"><div class="section-header"><h2><i class="fas fa-search"></i> Hasil pencarian: "${query}"</h2><span class="badge">${data.data.length} ditemukan</span></div><div class="carousel-wrapper"><div class="carousel-track" style="flex-wrap: wrap; gap: 1rem; overflow-x: visible;">`;
        data.data.forEach(item => {
          const titleText = item.title || 'Tanpa Judul';
          const coverUrl = item.images?.jpg?.image_url || '';
          const year = item.published?.prop?.from?.year || '?';
          const type = item.type || 'Manga';
          html += `
            <div class="manga-card" data-mal-id="${item.mal_id}" data-title="${encodeURIComponent(titleText)}" style="flex:0 0 160px;width:160px;">
              <img src="${coverUrl}" alt="${titleText}" loading="lazy" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 280%22%3E%3Crect fill=%22%23111%22 width=%22200%22 height=%22280%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-family=%22sans-serif%22 font-size=%2214%22 fill=%22%23666%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Cover%3C/text%3E%3C/svg%3E'">
              <div class="info"><div class="title">${titleText}</div><div class="meta"><span>${type}</span><span>${year}</span></div></div>
            </div>
          `;
        });
        html += `</div></div></div>`;
        container.innerHTML = html;
        document.querySelectorAll('.manga-card').forEach(card => {
          card.addEventListener('click', () => {
            const malId = card.dataset.malId;
            const title = decodeURIComponent(card.dataset.title);
            if (malId) window.location.href = `detail.html?mal=${malId}&title=${encodeURIComponent(title)}`;
          });
        });
      } catch (err) {
        container.innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
      }
    }

    searchBtn.addEventListener('click', handleSearch);
    searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSearch(); });
    loadAllSections();

    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      menuToggle.querySelector('i').className = navLinks.classList.contains('active') ? 'fas fa-xmark' : 'fas fa-bars';
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          navLinks.classList.remove('active');
          menuToggle.querySelector('i').className = 'fas fa-bars';
        }
      });
    });
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });
  </script>
</body>
</html>
