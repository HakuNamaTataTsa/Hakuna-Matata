<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test MangaDex Proxy</title>
  <style>
    body { font-family: Arial; background: #0a0a0f; color: #eee; padding: 20px; }
    h1 { color: #FFDD57; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .card { background: #1a1a24; border-radius: 8px; padding: 10px; text-align: center; }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; background: #222; }
    .card h3 { font-size: 14px; margin: 8px 0 4px; }
    .card p { font-size: 12px; color: #999; margin: 0; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>📚 Test MangaDex Proxy</h1>
  <p>Mengambil data dari: <code>https://wandering-violet-e0b0.akinostore.workers.dev</code></p>
  <div id="container" class="grid">⏳ Memuat...</div>

  <script>
    const WORKER_URL = 'https://wandering-violet-e0b0.akinostore.workers.dev';
    const container = document.getElementById('container');

    async function testManga() {
      try {
        // 1. Ambil data API lewat Worker
        const url = `${WORKER_URL}/manga?limit=10&availableTranslatedLanguage[]=id&includes[]=cover_art`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        console.log('Data dari Worker:', data);

        const mangaList = data.data || [];
        if (mangaList.length === 0) {
          container.innerHTML = '<p class="error">Tidak ada manga ditemukan.</p>';
          return;
        }

        // 2. Render kartu manga
        let html = '';
        mangaList.forEach(manga => {
          const title = manga.attributes.title.en || Object.values(manga.attributes.title)[0] || 'Tanpa Judul';
          let coverFile = null;
          const coverRel = manga.relationships.find(r => r.type === 'cover_art');
          if (coverRel && coverRel.attributes?.fileName) {
            coverFile = coverRel.attributes.fileName;
          }
          // Buat URL cover melalui proxy Worker
          let coverUrl = '';
          if (coverFile && manga.id) {
            const directUrl = `https://uploads.mangadex.org/covers/${manga.id}/${coverFile}`;
            // Kirim melalui proxy /image/
            coverUrl = `${WORKER_URL}/image/?url=${encodeURIComponent(directUrl)}`;
          } else {
            coverUrl = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280"%3E%3Crect fill="%23111" width="200" height="280"/%3E%3Ctext x="50%25" y="50%25" font-family="sans-serif" font-size="14" fill="%23666" text-anchor="middle" dy=".3em"%3ENo Cover%3C/text%3E%3C/svg%3E';
          }

          html += `
            <div class="card">
              <img src="${coverUrl}" alt="${title}" loading="lazy" referrerpolicy="no-referrer" crossorigin="anonymous">
              <h3>${title}</h3>
              <p>${manga.attributes.year || '?'}</p>
            </div>
          `;
        });
        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `<p class="error">❌ Error: ${err.message}</p>`;
        console.error(err);
      }
    }

    testManga();
  </script>
</body>
</html>
