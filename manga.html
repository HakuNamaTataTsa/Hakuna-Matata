<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baca Manga - Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <a href="#" class="nav-brand" onclick="navigate('home')"><i class="fas fa-store"></i> Akino Store</a>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a onclick="navigate('home')" class="active">Home</a></li>
      <li><a onclick="navigate('latest')">Terbaru</a></li>
      <li><a onclick="navigate('popular')">Populer</a></li>
      <li><a onclick="navigate('search')">Cari</a></li>
    </ul>
  </nav>

  <!-- ===== KONTEN ===== -->
  <div class="container" id="app">
    <!-- HOME -->
    <div id="page-home" class="page active">
      <div class="page-header">
        <h1>📚 Baca <span>Manga</span></h1>
        <div style="color:var(--muted);font-size:0.85rem;">
          <i class="fas fa-info-circle"></i> Klik manga untuk detail & baca
        </div>
      </div>
      <div id="home-grid" class="grid"><div class="loading">⏳ Memuat...</div></div>
    </div>

    <!-- LATEST -->
    <div id="page-latest" class="page">
      <div class="page-header">
        <h1>🆕 Update <span>Terbaru</span></h1>
      </div>
      <div id="latest-grid" class="grid"><div class="loading">⏳ Memuat...</div></div>
    </div>

    <!-- POPULAR -->
    <div id="page-popular" class="page">
      <div class="page-header">
        <h1>🔥 Manga <span>Populer</span></h1>
      </div>
      <div id="popular-grid" class="grid"><div class="loading">⏳ Memuat...</div></div>
    </div>

    <!-- SEARCH -->
    <div id="page-search" class="page">
      <div class="page-header">
        <h1>🔍 Cari <span>Manga</span></h1>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Masukkan judul...">
          <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
        </div>
      </div>
      <div id="search-grid" class="grid"><p style="color:var(--muted);">Cari manga favoritmu di atas.</p></div>
    </div>

    <!-- DETAIL -->
    <div id="page-detail" class="page">
      <button class="back-btn" onclick="navigate('home')"><i class="fas fa-arrow-left"></i> Kembali</button>
      <div id="detail-content"></div>
    </div>

    <!-- READER -->
    <div id="page-reader" class="page">
      <button class="back-btn" onclick="navigate('detail')"><i class="fas fa-arrow-left"></i> Kembali ke Detail</button>
      <div id="reader-content"></div>
    </div>
  </div>

  <footer class="footer">
    Data dari <a href="https://mangadex.org" target="_blank" style="color:var(--accent);">MangaDex</a> • 
    <span style="color:var(--muted);">Untuk tujuan belajar – tidak untuk komersial</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
