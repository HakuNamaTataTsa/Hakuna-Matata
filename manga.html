<!DOCTYPE html>
<html>
<head>
    <title>Test Cover MangaDex</title>
    <style>
        body { background: #0a0a0f; color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: #1a1a24; border-radius: 12px; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; }
        .card .title { padding: 10px; font-size: 14px; }
        .log { background: #111; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 13px; color: #aaa; max-height: 300px; overflow-y: auto; }
        .log .ok { color: #4caf50; }
        .log .err { color: #f44336; }
    </style>
</head>
<body>
    <h1>Test Cover MangaDex (Direct URL)</h1>
    <div id="log" class="log">⏳ Memuat...</div>
    <div id="grid" class="grid"></div>

    <script>
        const WORKER_URL = 'https://wandering-violet-e0b0.akinostore.workers.dev';
        const log = document.getElementById('log');
        const grid = document.getElementById('grid');

        function addLog(msg, type = '') {
            const p = document.createElement('div');
            p.textContent = msg;
            if (type) p.className = type;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        async function test() {
            try {
                addLog('📡 Memuat data manga...');
                const res = await fetch(`${WORKER_URL}/manga?limit=10&availableTranslatedLanguage[]=id&order[updatedAt]=desc&includes[]=cover_art`);
                const data = await res.json();
                addLog(`✅ Berhasil mengambil ${data.data.length} manga`, 'ok');
                
                grid.innerHTML = '';
                for (const manga of data.data) {
                    const title = manga.attributes.title.en || manga.attributes.title.id || '?';
                    let coverFile = null;
                    const coverRel = manga.relationships.find(r => r.type === 'cover_art');
                    if (coverRel) coverFile = coverRel.attributes?.fileName;
                    
                    // Direct URL (tanpa proxy)
                    const directUrl = coverFile ? `https://uploads.mangadex.org/covers/${manga.id}/${coverFile}` : '';
                    const placeholder = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280"%3E%3Crect fill="%23111" width="200" height="280"/%3E%3Ctext x="50%25" y="50%25" font-family="sans-serif" font-size="14" fill="%23666" text-anchor="middle" dy=".3em"%3ENo Cover%3C/text%3E%3C/svg%3E';

                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const img = document.createElement('img');
                    img.src = directUrl || placeholder;
                    img.alt = title;
                    img.referrerPolicy = 'no-referrer';
                    img.crossOrigin = 'anonymous';
                    
                    img.onerror = function() {
                        addLog(`❌ Cover gagal: ${title}`, 'err');
                        this.src = placeholder;
                    };
                    
                    img.onload = function() {
                        addLog(`✅ Cover berhasil: ${title}`, 'ok');
                    };

                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'title';
                    titleDiv.textContent = title;

                    card.appendChild(img);
                    card.appendChild(titleDiv);
                    grid.appendChild(card);
                }

                addLog('✅ Selesai', 'ok');
            } catch (err) {
                addLog(`❌ Error: ${err.message}`, 'err');
            }
        }

        test();
    </script>
</body>
</html>
