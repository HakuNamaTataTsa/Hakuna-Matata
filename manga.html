<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baca Manga - Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #07070d;
      --fg: #f0f0f5;
      --accent: #FFDD57;
      --border: rgba(255,255,255,0.07);
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding-top: 80px;
    }
    a { text-decoration: none; color: inherit; }

    .navbar {
      position: fixed; top:0; left:0; right:0; z-index:100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 2rem;
      background: rgba(7,7,13,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .navbar.scrolled { background: rgba(7,7,13,0.92); box-shadow: 0 4px 30px rgba(0,0,0,0.2); }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-brand i { font-size: 1rem; opacity: 0.7; }
    .nav-links {
      list-style: none; display: flex; gap: 0.2rem; align-items: center;
    }
    .nav-links a {
      color: #7a7a90; padding: 0.4rem 0.9rem; border-radius: 10px;
      font-size: 0.85rem; font-weight: 500;
      transition: all 0.25s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--fg); background: rgba(255,255,255,0.04);
    }
    .nav-links a.active { color: var(--accent); background: rgba(255,221,87,0.15); }
    .menu-toggle {
      display: none; background: none; border: 1px solid var(--border);
      color: var(--fg); font-size: 1.2rem; cursor: pointer;
      width: 40px; height: 40px; border-radius: 10px;
      align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      .navbar { padding: 0.6rem 1rem; }
      .menu-toggle { display: flex; }
      .nav-links {
        display: none; position: absolute; top:100%; left:0; right:0;
        flex-direction: column; background: rgba(7,7,13,0.97);
        backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
        padding: 0.8rem; gap: 0.1rem;
      }
      .nav-links.active { display: flex; }
      .nav-links a { padding: 0.5rem 0.8rem; width: 100%; }
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
    }
    .page-header h1 span { color: var(--accent); }
    .page-header .info {
      font-size: 0.85rem;
      color: #7a7a90;
    }
    .page-header .info i { color: var(--accent); }

    .iframe-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 180px);
      min-height: 600px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #0a0a12;
    }
    .iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.75rem;
      color: #7a7a90;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    @media (max-width: 600px) {
      .iframe-wrapper { height: calc(100vh - 140px); min-height: 400px; }
      .page-header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand"><i class="fas fa-store"></i> Akino Store</a>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="manga.html" class="active">Manga</a></li>
      <li><a href="https://wa.me/6289687163314" target="_blank">Contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>📚 Baca <span>Manga</span></h1>
      <div class="info">
        <i class="fas fa-info-circle"></i> 
        Sumber: <a href="https://mangadex.org" target="_blank" style="color:var(--accent);">MangaDex</a>
      </div>
    </div>
    <div class="iframe-wrapper">
      <iframe 
        src="https://mangadex.org/" 
        allowfullscreen
        loading="lazy"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
      ></iframe>
    </div>
  </div>

  <footer class="footer">
    Data dari <a href="https://mangadex.org" target="_blank" style="color:var(--accent);">MangaDex</a> • 
    <span style="color:#7a7a90;">Untuk tujuan belajar – tidak untuk komersial</span>
  </footer>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      menuToggle.querySelector('i').className = navLinks.classList.contains('active') ? 'fas fa-xmark' : 'fas fa-bars';
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          navLinks.classList.remove('active');
          menuToggle.querySelector('i').className = 'fas fa-bars';
        }
      });
    });
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });
  </script>
</body>
</html>
