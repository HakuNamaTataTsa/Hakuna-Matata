<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Proxy Gambar MangaDex</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #FFDD57; }
        .status {
            padding: 10px 16px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: bold;
        }
        .success { background: #1a3a1a; color: #7ddf7d; }
        .error { background: #3a1a1a; color: #ff6b6b; }
        .info { background: #1a2a3a; color: #6bb5ff; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #1a1a24;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
        }
        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #111;
        }
        .card .info {
            padding: 10px;
            font-size: 0.8rem;
        }
        .card .title {
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card .id {
            color: #777;
            font-size: 0.6rem;
            margin-top: 4px;
        }
        .log {
            background: #111;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
            border: 1px solid #2a2a3a;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn {
            padding: 8px 16px;
            background: #FFDD57;
            color: #0a0a0f;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 8px;
        }
        .btn:hover { background: #e6c64a; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🧪 Test MangaDex Proxy</h1>

    <div class="status info" id="status">⏳ Memuat data...</div>

    <div class="flex">
        <button class="btn" onclick="loadCovers()">🔄 Muat Ulang Cover</button>
        <button class="btn" onclick="testProxy()">🔍 Test Proxy Gambar</button>
    </div>

    <div id="grid" class="grid"></div>

    <div class="log" id="log">📋 Log akan muncul di sini...</div>

    <script>
        const WORKER_URL = 'https://wandering-violet-e0b0.akinostore.workers.dev';
        const logDiv = document.getElementById('log');
        const statusDiv = document.getElementById('status');
        const gridDiv = document.getElementById('grid');

        function log(msg) {
            logDiv.textContent += '\n' + msg;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        async function loadCovers() {
            log('📥 Memuat data manga...');
            statusDiv.textContent = '⏳ Memuat data...';
            statusDiv.className = 'status info';

            try {
                // Ambil 10 manga terbaru dengan bahasa Indonesia
                const url = `${WORKER_URL}/manga?limit=10&availableTranslatedLanguage[]=id&order[updatedAt]=desc&includes[]=cover_art`;
                log(`📡 Request: ${url}`);
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                log(`✅ Berhasil mengambil ${data.data.length} manga`);
                statusDiv.textContent = `✅ Berhasil mengambil ${data.data.length} manga`;
                statusDiv.className = 'status success';

                renderCovers(data.data);

            } catch (error) {
                log(`❌ Error: ${error.message}`);
                statusDiv.textContent = `❌ Error: ${error.message}`;
                statusDiv.className = 'status error';
            }
        }

        function renderCovers(mangaList) {
            let html = '';
            let coverCount = 0;
            let failCount = 0;

            mangaList.forEach((manga, index) => {
                const title = manga.attributes.title.en || Object.values(manga.attributes.title)[0] || 'Tanpa Judul';
                
                let coverFile = null;
                const coverRel = manga.relationships.find(r => r.type === 'cover_art');
                if (coverRel && coverRel.attributes?.fileName) {
                    coverFile = coverRel.attributes.fileName;
                }

                let directUrl = '';
                let proxyUrl = '';
                if (coverFile && manga.id) {
                    const original = `https://uploads.mangadex.org/covers/${manga.id}/${coverFile}`;
                    directUrl = original;
                    proxyUrl = `${WORKER_URL}/image/?url=${encodeURIComponent(original)}`;
                }

                // Gunakan direct URL dulu, fallback ke proxy jika gagal
                const imgSrc = directUrl || '';
                const fallbackSrc = proxyUrl || '';

                // Tambahkan event onerror untuk mencatat kegagalan
                const onError = `this.onerror=null; failCount++; log('❌ Cover ${index+1} gagal dimuat: ' + this.src); console.log('Cover gagal:', this.src); this.src='${fallbackSrc}';`;

                html += `
                    <div class="card">
                        <img 
                            src="${imgSrc}" 
                            alt="${title}"
                            loading="lazy"
                            referrerpolicy="no-referrer"
                            crossorigin="anonymous"
                            onerror="${onError}"
                            onload="coverCount++; log('✅ Cover ${index+1} berhasil dimuat'); console.log('Cover berhasil:', this.src);"
                        >
                        <div class="info">
                            <div class="title">${title}</div>
                            <div class="id">ID: ${manga.id.substring(0, 12)}...</div>
                        </div>
                    </div>
                `;
            });

            gridDiv.innerHTML = html;

            // Log info
            log(`📊 ${mangaList.length} manga ditampilkan`);
            log(`💡 Cover akan dimuat dari direct URL, fallback ke proxy jika gagal`);
            log(`🖼️ Proxy URL: ${WORKER_URL}/image/?url=...`);
        }

        // Fungsi test proxy langsung
        async function testProxy() {
            log('🔍 Testing proxy gambar...');
            const testUrl = 'https://uploads.mangadex.org/covers/1/cover.jpg';
            const proxyUrl = `${WORKER_URL}/image/?url=${encodeURIComponent(testUrl)}`;
            
            log(`📡 Proxy URL: ${proxyUrl}`);
            
            try {
                const response = await fetch(proxyUrl);
                log(`📊 Status: ${response.status} ${response.statusText}`);
                
                if (response.ok) {
                    const blob = await response.blob();
                    log(`✅ Proxy berhasil! Ukuran gambar: ${blob.size} bytes, tipe: ${blob.type}`);
                    
                    // Tampilkan gambar hasil proxy
                    const img = document.createElement('img');
                    img.src = proxyUrl;
                    img.style.maxWidth = '200px';
                    img.style.borderRadius = '8px';
                    img.style.marginTop = '10px';
                    img.style.border = '2px solid #FFDD57';
                    document.body.appendChild(img);
                    log('🖼️ Gambar hasil proxy ditampilkan di bawah');
                } else {
                    log(`❌ Proxy gagal dengan status ${response.status}`);
                }
            } catch (error) {
                log(`❌ Error test proxy: ${error.message}`);
            }
        }

        // Jalankan otomatis
        loadCovers();
    </script>
</body>
</html>
