<!DOCTYPE html>
<html>
<head>
    <title>Test Cepat MangaDex Proxy</title>
    <style>
        body { background: #0a0a0f; color: #e0e0e0; font-family: Arial; padding: 20px; }
        .result { padding: 15px; border-radius: 8px; margin: 10px 0; }
        .success { background: #1a3a1a; border: 1px solid #4caf50; color: #4caf50; }
        .error { background: #3a1a1a; border: 1px solid #f44336; color: #f44336; }
        .info { background: #1a1a3a; border: 1px solid #64b5f6; color: #64b5f6; }
        code { color: #FFDD57; }
        img { max-width: 300px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🧪 Test Cepat MangaDex Proxy</h1>
    <p>Worker: <code>https://plain-block-86e9.akinostore.workers.dev/</code></p>

    <div id="log"></div>

    <script>
        const WORKER_URL = 'https://plain-block-86e9.akinostore.workers.dev';
        const log = document.getElementById('log');

        function addLog(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = msg;
            log.appendChild(div);
        }

        async function test() {
            addLog('📡 Menguji proxy gambar...', 'info');

            // Test 1: Proxy gambar
            const testUrl = `${WORKER_URL}/image/?url=${encodeURIComponent('https://uploads.mangadex.org/covers/1/cover.jpg')}`;
            addLog(`🔗 URL: ${testUrl}`, 'info');

            try {
                const response = await fetch(testUrl);

                if (response.ok) {
                    addLog(`✅ Proxy berhasil! Status: ${response.status}`, 'success');
                    // Tampilkan gambar
                    const img = document.createElement('img');
                    img.src = testUrl;
                    img.alt = 'Cover test';
                    document.body.appendChild(img);
                    addLog('🖼️ Gambar ditampilkan di atas', 'success');
                } else {
                    const text = await response.text();
                    addLog(`❌ Proxy gagal! Status: ${response.status}`, 'error');
                    addLog(`📄 Response: ${text.substring(0, 200)}`, 'error');
                }
            } catch (err) {
                addLog(`❌ Error: ${err.message}`, 'error');
            }

            // Test 2: API Manga
            addLog('📡 Menguji API manga...', 'info');
            try {
                const apiUrl = `${WORKER_URL}/manga?limit=3&availableTranslatedLanguage[]=id`;
                const res = await fetch(apiUrl);
                const data = await res.json();
                if (data.data && data.data.length > 0) {
                    addLog(`✅ API berhasil! Mendapat ${data.data.length} manga`, 'success');
                    data.data.forEach(m => {
                        const title = m.attributes.title.en || m.attributes.title.id || '?';
                        addLog(`  📖 ${title}`, 'info');
                    });
                } else {
                    addLog(`⚠️ API berhasil tapi tidak ada data`, 'error');
                }
            } catch (err) {
                addLog(`❌ API error: ${err.message}`, 'error');
            }
        }

        test();
    </script>
</body>
</html>
