<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Profil – Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" href="https://res.cloudinary.com/d39mdjct/image/upload/v1783478697/icon_tnzy32.ico" />
  <link rel="manifest" href="/manifest.json?v=4.1" />
<script src="firebase-init.js?v=4.1"></script>
  <meta name="theme-color" content="#3B82F6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/d39mdjct/image/upload/w_180,h_180,c_fit/v1783493763/apk_pgxcmo.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="https://res.cloudinary.com/d39mdjct/image/upload/w_152,h_152,c_fit/v1783493763/apk_pgxcmo.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="https://res.cloudinary.com/d39mdjct/image/upload/w_167,h_167,c_fit/v1783493763/apk_pgxcmo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://res.cloudinary.com/d39mdjct/image/upload/w_180,h_180,c_fit/v1783493763/apk_pgxcmo.png" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a12;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .ambient .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.08;
    }
    .ambient .glow-1 {
      width: 500px;
      height: 500px;
      top: -200px;
      left: -150px;
      background: #3B82F6;
      animation: float1 14s ease-in-out infinite;
    }
    .ambient .glow-2 {
      width: 400px;
      height: 400px;
      bottom: -150px;
      right: -100px;
      background: #60a5fa;
      animation: float2 18s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,
      100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(80px, 60px);
      }
    }
    @keyframes float2 {
      0%,
      100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(-60px, -80px);
      }
    }
    .profile-container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
      background: rgba(20, 20, 30, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      padding: 2.2rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
    }
    .profile-container:hover {
      border-color: rgba(59, 130, 246, 0.15);
      box-shadow: 0 20px 80px rgba(59, 130, 246, 0.05);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #8a8a9e;
      text-decoration: none;
      font-size: 0.78rem;
      margin-bottom: 1rem;
      transition: all 0.3s;
      font-weight: 500;
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
    }
    .back-link:hover {
      color: #3B82F6;
      background: rgba(59, 130, 246, 0.08);
    }
    .back-link i {
      font-size: 0.65rem;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 1.5rem;
    }
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.05));
      border: 2px solid rgba(59, 130, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #3B82F6;
      flex-shrink: 0;
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-info h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.1rem;
      letter-spacing: -0.3px;
    }
    .profile-info .email {
      font-size: 0.82rem;
      color: #8a8a9e;
      word-break: break-all;
    }
    .profile-info .status {
      font-size: 0.7rem;
      color: #22c55e;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.2rem;
    }
    .profile-info .status i {
      font-size: 0.5rem;
    }
    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--fg);
    }
    .section-title i {
      color: #3B82F6;
      font-size: 0.8rem;
    }
    .section-title .count {
      font-size: 0.6rem;
      padding: 0.1rem 0.5rem;
      border-radius: 50px;
      background: rgba(59, 130, 246, 0.12);
      color: #3B82F6;
      font-weight: 600;
    }
    .empty-state {
      text-align: center;
      padding: 1.5rem 0.5rem;
      color: #5a5a6e;
      font-size: 0.82rem;
    }
    .empty-state i {
      font-size: 1.8rem;
      display: block;
      margin-bottom: 0.5rem;
      opacity: 0.3;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 0.3rem;
    }
    .history-list::-webkit-scrollbar {
      width: 3px;
    }
    .history-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.5rem 0.7rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      transition: all 0.3s;
      cursor: pointer;
    }
    .history-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(59, 130, 246, 0.15);
    }
    .history-item .thumb {
      width: 36px;
      height: 50px;
      border-radius: 6px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
      flex-shrink: 0;
    }
    .history-item .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .history-item .info {
      flex: 1;
      min-width: 0;
    }
    .history-item .info .title {
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item .info .meta {
      font-size: 0.6rem;
      color: #6a6a7e;
      display: flex;
      gap: 0.5rem;
    }
    .history-item .ch-num {
      font-size: 0.65rem;
      color: #3B82F6;
      font-weight: 600;
      flex-shrink: 0;
    }
    .profile-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .profile-actions .btn {
      flex: 1;
      padding: 0.7rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-family: 'Inter', sans-serif;
      min-width: 100px;
    }
    .profile-actions .btn-primary {
      background: linear-gradient(145deg, #3B82F6, #2563eb);
      color: #fff;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.2);
    }
    .profile-actions .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
    }
    .profile-actions .btn-primary:active {
      transform: scale(0.97);
    }
    .profile-actions .btn-danger {
      background: rgba(239, 68, 68, 0.12);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.15);
    }
    .profile-actions .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.3);
      transform: translateY(-2px);
    }
    .profile-actions .btn-danger:active {
      transform: scale(0.97);
    }
    .profile-actions .btn-outline {
      background: rgba(255, 255, 255, 0.04);
      color: #f0f0f0;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .profile-actions .btn-outline:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
    }
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 90%;
    }
    .toast {
      padding: 0.7rem 1.4rem;
      background: rgba(20, 20, 30, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: slideInToast 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 0.82rem;
      border-left: 3px solid #3B82F6;
    }
    .toast i {
      color: #3B82F6;
      font-size: 0.9rem;
    }
    .toast.error {
      border-left-color: #ef4444;
    }
    .toast.error i {
      color: #ef4444;
    }
    .toast.success {
      border-left-color: #22c55e;
    }
    .toast.success i {
      color: #22c55e;
    }
    @keyframes slideInToast {
      from {
        opacity: 0;
        transform: translateX(50px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
    @media (max-width: 480px) {
      .profile-container {
        padding: 1.5rem 1.2rem;
        border-radius: 16px;
      }
      .profile-header {
        flex-direction: column;
        text-align: center;
        gap: 0.8rem;
      }
      .profile-avatar {
        width: 64px;
        height: 64px;
        font-size: 1.6rem;
      }
      .profile-info h2 {
        font-size: 1.05rem;
      }
      .profile-info .email {
        font-size: 0.75rem;
      }
      .profile-actions .btn {
        font-size: 0.78rem;
        padding: 0.6rem;
        flex: 1 1 100%;
      }
      .history-item .thumb {
        width: 30px;
        height: 42px;
      }
      .history-item .info .title {
        font-size: 0.72rem;
      }
      .section-title {
        font-size: 0.82rem;
      }
      .history-item .ch-num {
        font-size: 0.6rem;
      }
    }
    @media (min-width: 768px) {
      .profile-container {
        padding: 2.5rem 2.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="ambient" aria-hidden="true">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </div>

  <div class="profile-container" id="profileContainer">
    <a href="manga.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Manga</a>

    <div class="profile-header">
      <div class="profile-avatar" id="avatarContainer">
        <i class="fas fa-user" id="avatarIcon"></i>
        <img id="avatarImg" style="display:none;" alt="Avatar" />
      </div>
      <div class="profile-info">
        <h2 id="profileName">Loading...</h2>
        <div class="email" id="profileEmail">-</div>
        <div class="status"><i class="fas fa-circle"></i> Aktif</div>
      </div>
    </div>

    <div class="section-title">
      <i class="fas fa-clock"></i> Riwayat Baca
      <span class="count" id="historyCount">0</span>
    </div>
    <div id="historyList" class="history-list">
      <div class="empty-state"><i class="fas fa-book-open"></i>Belum ada riwayat baca.</div>
    </div>

    <div class="section-title" style="margin-top:1.2rem;">
      <i class="fas fa-bookmark"></i> Bookmark
      <span class="count" id="bookmarkCount">0</span>
    </div>
    <div id="bookmarkList" class="history-list" style="max-height:180px;">
      <div class="empty-state"><i class="fas fa-bookmark"></i>Belum ada bookmark.</div>
    </div>

    <div class="profile-actions">
      <a href="manga.html" class="btn btn-primary"><i class="fas fa-book-open"></i> Lanjut Membaca</a>
      <button class="btn btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { info: 'fa-info-circle', success: 'fa-check-circle', error: 'fa-exclamation-circle' };
      toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(40px) scale(0.9)';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    async function loadProfile() {
      const user = firebase.auth().currentUser;
      if (!user) {
        showToast('Silakan login terlebih dahulu.', 'error');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }

      const avatarContainer = document.getElementById('avatarContainer');
      const avatarIcon = document.getElementById('avatarIcon');
      const avatarImg = document.getElementById('avatarImg');
      const nameEl = document.getElementById('profileName');
      const emailEl = document.getElementById('profileEmail');
      const historyList = document.getElementById('historyList');
      const bookmarkList = document.getElementById('bookmarkList');
      const historyCount = document.getElementById('historyCount');
      const bookmarkCount = document.getElementById('bookmarkCount');

      if (user.photoURL) {
        avatarIcon.style.display = 'none';
        avatarImg.style.display = 'block';
        avatarImg.src = user.photoURL;
      } else {
        avatarIcon.style.display = 'flex';
        avatarImg.style.display = 'none';
      }

      let displayName = user.displayName || 'Pengguna';
      if (!user.displayName) {
        try {
          const userData = await getUserProfile(user.uid);
          if (userData && userData.name) displayName = userData.name;
        } catch (e) { console.error(e); }
      }
      nameEl.textContent = displayName;
      emailEl.textContent = user.email || '-';

      try {
        // 🔥 AMBIL BOOKMARK dari dokumen utama
        const userData = await getUserProfile(user.uid);
        const bookmarks = userData?.bookmarks || [];
        bookmarkCount.textContent = bookmarks.length;

        // 🔥 AMBIL RIWAYAT BACA dari subcollection
        const historySnapshot = await db.collection('users').doc(user.uid).collection('readingHistory')
          .orderBy('lastReadAt', 'desc')
          .limit(50)
          .get();
        const history = [];
        historySnapshot.forEach(doc => {
          history.push({ id: doc.id, ...doc.data() });
        });
        historyCount.textContent = history.length;

        // Render history
        if (history.length > 0) {
          historyList.innerHTML = '';
          history.slice(0, 10).forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            const coverHtml = item.coverUrl ?
              `<img src="${item.coverUrl}" alt="${item.mangaTitle}" />` :
              '<i class="fas fa-book" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#3B82F6;font-size:0.8rem;"></i>';
            div.innerHTML = `
              <div class="thumb">${coverHtml}</div>
              <div class="info"><div class="title">${item.mangaTitle || 'Manga'}</div><div class="meta">Ch. ${item.lastChapterNum || '?'}</div></div>
              <span class="ch-num">Ch. ${item.lastChapterNum || '?'}</span>
            `;
            div.addEventListener('click', () => {
              if (item.lastChapterId) {
                window.location.href = `reader.html?chapter=${item.lastChapterId}`;
              } else {
                showToast('Chapter tidak ditemukan.', 'error');
              }
            });
            historyList.appendChild(div);
          });
          if (history.length > 10) {
            const more = document.createElement('div');
            more.style.cssText = 'text-align:center;font-size:0.7rem;color:#5a5a6e;padding:0.3rem;cursor:pointer;';
            more.textContent = `+ ${history.length - 10} lainnya`;
            more.addEventListener('click', () => {
              historyList.innerHTML = '';
              history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const coverHtml = item.coverUrl ?
                  `<img src="${item.coverUrl}" alt="${item.mangaTitle}" />` :
                  '<i class="fas fa-book" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#3B82F6;font-size:0.8rem;"></i>';
                div.innerHTML = `
                  <div class="thumb">${coverHtml}</div>
                  <div class="info"><div class="title">${item.mangaTitle || 'Manga'}</div><div class="meta">Ch. ${item.lastChapterNum || '?'}</div></div>
                  <span class="ch-num">Ch. ${item.lastChapterNum || '?'}</span>
                `;
                div.addEventListener('click', () => {
                  if (item.lastChapterId) {
                    window.location.href = `reader.html?chapter=${item.lastChapterId}`;
                  } else {
                    showToast('Chapter tidak ditemukan.', 'error');
                  }
                });
                historyList.appendChild(div);
              });
            });
            historyList.appendChild(more);
          }
        } else {
          historyList.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i>Belum ada riwayat baca.</div>';
        }

        // Render bookmarks
        if (bookmarks.length > 0) {
          bookmarkList.innerHTML = '';
          bookmarks.slice(0, 5).forEach(id => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
              <div class="info"><div class="title">📖 Manga ID: ${id.substring(0, 12)}...</div></div>
              <span class="ch-num" style="color:#8a8a9e;">Bookmark</span>
            `;
            div.addEventListener('click', () => {
              window.location.href = `detail.html?id=${id}`;
            });
            bookmarkList.appendChild(div);
          });
          if (bookmarks.length > 5) {
            const more = document.createElement('div');
            more.style.cssText = 'text-align:center;font-size:0.7rem;color:#5a5a6e;padding:0.3rem;cursor:pointer;';
            more.textContent = `+ ${bookmarks.length - 5} lainnya`;
            more.addEventListener('click', () => {
              bookmarkList.innerHTML = '';
              bookmarks.forEach(id => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                  <div class="info"><div class="title">📖 Manga ID: ${id.substring(0, 12)}...</div></div>
                  <span class="ch-num" style="color:#8a8a9e;">Bookmark</span>
                `;
                div.addEventListener('click', () => {
                  window.location.href = `detail.html?id=${id}`;
                });
                bookmarkList.appendChild(div);
              });
            });
            bookmarkList.appendChild(more);
          }
        } else {
          bookmarkList.innerHTML = '<div class="empty-state"><i class="fas fa-bookmark"></i>Belum ada bookmark.</div>';
        }

      } catch (e) {
        console.error('Load user data error:', e);
        historyList.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Gagal memuat riwayat baca.</div>';
        bookmarkList.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Gagal memuat bookmark.</div>';
      }
    }

    async function getUserProfile(uid) {
      try {
        const doc = await db.collection('users').doc(uid).get();
        return doc.exists ? doc.data() : null;
      } catch { return null; }
    }

    function logout() {
      if (confirm('Yakin ingin keluar?')) {
        firebase.auth().signOut()
          .then(() => {
            showToast('Berhasil keluar.', 'success');
            setTimeout(() => window.location.href = 'login.html', 500);
          })
          .catch((err) => {
            showToast('Gagal keluar: ' + err.message, 'error');
          });
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', logout);

    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        loadProfile();
      } else {
        showToast('Silakan login terlebih dahulu.', 'error');
        setTimeout(() => window.location.href = 'login.html', 1000);
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(() => console.log('✅ SW registered'))
          .catch(err => console.log('❌ SW failed:', err));
      });
    }
  </script>

  <script>
  // 🔥 Force update service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg) {
        reg.update();
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed') {
              newSW.postMessage('skipWaiting');
              // Refresh halaman setelah update
              setTimeout(() => {
                window.location.reload();
              }, 800);
            }
          });
        });
      }
    });
  }
</script>
</body>
</html>
